<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로블록스 차세대 통합 관제 시스템</title>
    <!-- Google Fonts 및 FontAwesome 아이콘 적용 -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Noto+Sans+KR:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #0b0c16;
            --panel-bg: rgba(26, 27, 46, 0.7);
            --panel-border: rgba(79, 172, 254, 0.2);
            --primary: #4facfe;
            --accent: #00f2fe;
            --danger: #ff4d6d;
            --danger-glow: rgba(255, 77, 109, 0.4);
            --success: #2ecc71;
            --text-main: #f1f2f6;
            --text-muted: #a0a5c2;
        }

        * {
            box-sizing: border-box;
            font-family: 'Noto Sans KR', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(79, 172, 254, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(0, 242, 254, 0.05) 0%, transparent 40%);
        }

        /* 인증 레이어 (로그인 화면) */
        #auth-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(7, 8, 15, 0.95);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
        }

        .auth-card {
            background: rgba(26, 27, 46, 0.85);
            border: 1px solid var(--panel-border);
            padding: 40px;
            border-radius: 16px;
            width: 400px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        .auth-card h2 {
            font-family: 'Orbitron', sans-serif;
            color: var(--primary);
            margin-bottom: 30px;
            letter-spacing: 2px;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 6px;
        }

        .form-control {
            width: 100%;
            background: rgba(11, 12, 22, 0.8);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 12px;
            border-radius: 8px;
            color: white;
            font-size: 15px;
            transition: 0.3s;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 10px rgba(79, 172, 254, 0.3);
        }

        /* 사이드바 */
        .sidebar {
            width: 280px;
            background: rgba(17, 18, 31, 0.95);
            border-right: 1px solid var(--panel-border);
            display: flex;
            flex-direction: column;
            padding: 20px;
            z-index: 100;
        }

        .sidebar-brand {
            font-family: 'Orbitron', sans-serif;
            font-size: 20px;
            font-weight: 900;
            color: var(--primary);
            text-shadow: 0 0 10px rgba(79, 172, 254, 0.4);
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .user-profile-box {
            background: rgba(255,255,255,0.03);
            border-radius: 12px;
            padding: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 25px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .user-profile-box img {
            width: 44px; height: 44px; border-radius: 50%;
            background: #151622; border: 2px solid var(--primary);
        }

        .user-info .u-name { font-weight: bold; font-size: 14px; }
        .user-info .u-role { font-size: 11px; color: var(--accent); }

        .menu-item {
            padding: 12px 16px;
            border-radius: 8px;
            color: var(--text-muted);
            cursor: pointer;
            margin-bottom: 8px;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 500;
        }

        .menu-item:hover, .menu-item.active {
            background: rgba(79, 172, 254, 0.15);
            color: var(--text-main);
            border-left: 4px solid var(--primary);
        }

        /* 메인 콘텐츠 레이아웃 */
        .main-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .top-navbar {
            height: 70px;
            background: rgba(17, 18, 31, 0.5);
            border-bottom: 1px solid var(--panel-border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
            backdrop-filter: blur(10px);
        }

        .top-navbar h1 {
            font-size: 18px; margin: 0; font-weight: 500; letter-spacing: 0.5px;
        }

        .content-body {
            flex: 1; padding: 25px; overflow-y: auto;
            display: flex; flex-direction: column; gap: 25px;
        }

        .view-section { display: none; flex-direction: column; gap: 25px; }
        .view-section.active { display: flex; }

        /* 관제 맵 레이아웃 */
        .map-section {
            background: var(--panel-bg);
            border-radius: 16px;
            border: 1px solid var(--panel-border);
            padding: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(8px);
        }

        .section-title {
            font-size: 15px; font-weight: 700; color: #fff; margin-bottom: 15px;
            display: flex; align-items: center; gap: 8px; text-transform: uppercase; letter-spacing: 1px;
        }

        .map-container {
            width: 100%; height: 420px; background: #07080f;
            border-radius: 12px; border: 1px solid rgba(255,255,255,0.05);
            position: relative; overflow: hidden;
        }

        .map-container::before {
            content: ''; position: absolute; width: 100%; height: 100%;
            background-image: 
                linear-gradient(rgba(79, 172, 254, 0.04) 1px, transparent 1px), 
                linear-gradient(90deg, rgba(79, 172, 254, 0.04) 1px, transparent 1px);
            background-size: 30px 30px;
        }

        .train-marker {
            position: absolute; width: 16px; height: 16px; background: var(--accent);
            border: 3px solid #fff; border-radius: 50%; transform: translate(-50%, -50%);
            transition: left 0.2s ease, top 0.2s ease; box-shadow: 0 0 12px var(--accent); z-index: 10;
        }

        .train-marker.ems {
            background: var(--danger); box-shadow: 0 0 15px var(--danger);
            animation: marker-blink 0.6s infinite alternate;
        }

        .train-marker-label {
            position: absolute; top: -26px; left: 50%; transform: translateX(-50%);
            background: rgba(7, 8, 15, 0.9); color: #fff; padding: 4px 8px;
            border-radius: 6px; font-size: 11px; font-weight: bold; white-space: nowrap;
            border: 1px solid var(--primary); pointer-events: none;
        }

        /* 열차 현황 카드 대시보드 */
        .grid-container {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 25px;
        }

        .train-card {
            background: var(--panel-bg); border-radius: 16px; border: 1px solid var(--panel-border);
            padding: 24px; box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2); backdrop-filter: blur(8px);
            display: flex; flex-direction: column; justify-content: space-between; transition: 0.3s;
        }

        .train-card:hover { transform: translateY(-3px); border-color: rgba(79, 172, 254, 0.4); }

        .card-header {
            display: flex; justify-content: space-between; align-items: flex-start;
            border-bottom: 1px solid rgba(255,255,255,0.08); padding-bottom: 12px; margin-bottom: 16px;
        }

        .v-name { font-size: 17px; font-weight: 700; color: #fff; }
        .train-id { font-size: 11px; color: var(--text-muted); font-family: 'Orbitron', sans-serif; }

        .info-row { display: flex; justify-content: space-between; margin-bottom: 12px; font-size: 14px; }
        .info-label { color: var(--text-muted); }
        .info-value { font-weight: 700; color: var(--accent); }

        .limit-input-zone {
            display: flex; align-items: center; justify-content: space-between;
            background: rgba(0,0,0,0.2); padding: 10px 14px; border-radius: 8px; margin: 15px 0;
            border: 1px solid rgba(255,255,255,0.03);
        }

        .limit-input {
            width: 65px; background: #07080f; border: 1px solid rgba(255,255,255,0.15);
            color: #fff; padding: 6px; border-radius: 6px; text-align: center; font-weight: bold;
        }

        .limit-input:focus { outline: none; border-color: var(--primary); }

        .driver-zone {
            display: flex; align-items: center; gap: 12px; background: rgba(255,255,255,0.02);
            padding: 12px; border-radius: 10px; margin-bottom: 16px; border: 1px solid rgba(255,255,255,0.04);
        }

        .avatar { width: 48px; height: 48px; border-radius: 50%; border: 2px solid var(--primary); background: #000; }
        .driver-meta { display: flex; flex-direction: column; }
        .driver-name { font-weight: 700; font-size: 14px; }

        .control-zone { display: flex; gap: 12px; }

        .btn {
            flex: 1; padding: 12px; font-size: 13px; font-weight: 700; border: none;
            border-radius: 8px; cursor: pointer; transition: 0.2s; color: white;
            display: flex; align-items: center; justify-content: center; gap: 6px;
        }

        .btn-primary { background: var(--primary); }
        .btn-primary:hover { background: #3a94e2; }
        .btn-danger { background: var(--danger); box-shadow: 0 4px 12px rgba(255,77,109,0.2); }
        .btn-danger:hover { background: #e0435f; }
        .btn-safe { background: var(--success); }
        .btn-safe:hover { background: #27ae60; }

        .status-badge { padding: 4px 8px; border-radius: 6px; font-size: 12px; font-weight: 700; }
        .status-normal { background: rgba(46, 204, 113, 0.15); color: var(--success); border: 1px solid var(--success); }
        .status-ems { background: rgba(255, 77, 109, 0.15); color: var(--danger); border: 1px solid var(--danger); animation: card-blink 1s infinite alternate; }

        /* 사용자 관리 및 로그 스타일 */
        .card-table-wrap {
            background: var(--panel-bg); border-radius: 16px; border: 1px solid var(--panel-border);
            padding: 24px; box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }

        .admin-flex { display: flex; gap: 30px; align-items: flex-start; }
        .admin-form { width: 320px; background: rgba(0,0,0,0.2); padding: 20px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); }

        .custom-table {
            width: 100%; border-collapse: collapse; text-align: left; margin-top: 10px;
        }

        .custom-table th, .custom-table td { padding: 14px; border-bottom: 1px solid rgba(255,255,255,0.06); }
        .custom-table th { color: var(--text-muted); font-weight: 500; font-size: 13px; }

        .log-box {
            background: #07080f; border-radius: 12px; padding: 15px; height: 500px;
            overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px; line-height: 1.6;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .log-line { margin-bottom: 8px; border-bottom: 1px solid rgba(255,255,255,0.02); padding-bottom: 4px; }
        .log-time { color: var(--primary); margin-right: 10px; }
        .log-user { color: var(--accent); font-weight: bold; margin-right: 6px; }

        .no-trains {
            text-align: center; color: var(--text-muted); font-size: 15px; padding: 60px 0; width: 100%; grid-column: 1 / -1;
        }

        @keyframes card-blink { 0% { box-shadow: 0 0 4px var(--danger-glow); } 100% { box-shadow: 0 0 16px var(--danger-glow); } }
        @keyframes marker-blink { 0% { transform: translate(-50%, -50%) scale(0.9); } 100% { transform: translate(-50%, -50%) scale(1.2); } }
    </style>
</head>

<body>

    <!-- 1단계: 인증 오버레이 (로그인 구조) -->
    <div id="auth-overlay">
        <div class="auth-card">
            <h2>TCMS LOGIN</h2>
            <div class="form-group">
                <label><i class="fa-solid fa-user"></i> 관리자 아이디</label>
                <input type="text" id="login-id" class="form-control" placeholder="ID를 입력하세요">
            </div>
            <div class="form-group">
                <label><i class="fa-solid fa-lock"></i> 비밀번호</label>
                <input type="password" id="login-pw" class="form-control" placeholder="Password를 입력하세요">
            </div>
            <button class="btn btn-primary" style="width:100%; margin-top:10px;" onclick="handleLogin()">시스템 접속</button>
        </div>
    </div>

    <!-- 좌측 내비게이션 사이드바 -->
    <div class="sidebar">
        <div class="sidebar-brand">
            <i class="fa-solid fa-circle-nodes"></i> NEXT-TCMS
        </div>
        
        <div class="user-profile-box">
            <!-- 기본 최고 관리자(1번 유저) 아바타 및 동적 할당용 이미지 -->
            <img id="my-avatar" src="https://thumbnails.roblox.com/v1/users/avatar-headshot?userIds=1&size=150x150&format=Png&isCircular=true" alt="My Avatar">
            <div class="user-info">
                <div class="u-name" id="session-username">운영자</div>
                <div class="u-role" id="session-role">최고 관리자 권한</div>
            </div>
        </div>

        <div class="menu-item active" onclick="switchView('dashboard', this)">
            <i class="fa-solid fa-chart-line"></i> 실시간 통합 관제
        </div>
        <div class="menu-item" id="menu-accounts" onclick="switchView('accounts', this)">
            <i class="fa-solid fa-users-gear"></i> 관제 계정 생성·관리
        </div>
        <div class="menu-item" onclick="switchView('logs', this)">
            <i class="fa-solid fa-file-shield"></i> 시스템 감사 로그
        </div>
        
        <button class="btn btn-danger" style="margin-top: auto; padding: 8px;" onclick="handleLogout()">
            <i class="fa-solid fa-right-from-bracket"></i> 로그아웃
        </button>
    </div>

    <!-- 우측 메인 랩퍼 영역 -->
    <div class="main-wrapper">
        <div class="top-navbar">
            <h1 id="nav-title">실시간 기차 통합 대시보드</h1>
            <div>
                <span style="font-size:13px; color:var(--text-muted);"><i class="fa-solid fa-clock"></i> SYSTEM LIVE</span>
            </div>
        </div>

        <div class="content-body">
            
            <!-- 뷰 1: 실시간 통합 관제 대시보드 -->
            <div id="view-dashboard" class="view-section active">
                <div class="map-section">
                    <div class="section-title"><i class="fa-solid fa-map-location-dot"></i> Live Tracking Display Map</div>
                    <div class="map-container" id="live-map"></div>
                </div>

                <div class="grid-container" id="dashboard-grid">
                    <div class="no-trains" id="no-trains-msg">네트워크 연결 대기 중이거나 운행 중인 열차가 없습니다.</div>
                </div>
            </div>

            <!-- 뷰 2: 관제 권한 하위 계정 관리 서브 기능 -->
            <div id="view-accounts" class="view-section">
                <div class="card-table-wrap">
                    <div class="section-title"><i class="fa-solid fa-user-plus"></i> 신규 하위 관제 계정 발급 시스템</div>
                    <div class="admin-flex">
                        <div class="admin-form">
                            <div class="form-group">
                                <label>신규 관제원 ID</label>
                                <input type="text" id="new-user-id" class="form-control" placeholder="아이디 지정">
                            </div>
                            <div class="form-group">
                                <label>초기 비밀번호</label>
                                <input type="password" id="new-user-pw" class="form-control" placeholder="비밀번호 지정">
                            </div>
                            <div class="form-group">
                                <label>연동할 로블록스 UserID (아바타 로드용)</label>
                                <input type="number" id="new-user-rbx" class="form-control" value="1" placeholder="예: 2439581">
                            </div>
                            <button class="btn btn-primary" style="width: 100%; margin-top: 10px;" onclick="createNewAccount()">계정 생성 및 발급</button>
                        </div>
                        
                        <div style="flex: 1;">
                            <table class="custom-table">
                                <thead>
                                    <tr>
                                        <th>아바타</th>
                                        <th>관제원 계정 ID</th>
                                        <th>연동 로블록스 ID</th>
                                        <th>권한 레벨</th>
                                        <th>상태</th>
                                    </tr>
                                </thead>
                                <tbody id="account-table-body">
                                    <!-- 계정 리스트 동적 렌더링 영역 -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 뷰 3: 시스템 감사 로그 조회 기능 -->
            <div id="view-logs" class="view-section">
                <div class="card-table-wrap">
                    <div class="section-title"><i class="fa-solid fa-terminal"></i> 실시간 관제 통제 및 명령어 감사 로그</div>
                    <div class="log-box" id="log-display-container">
                        <!-- 로그 데이터 실시간 출력 영역 -->
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        // 초기 고정 최고 관리자 정보 사양
        const MASTER_ADMIN = { id: "admin", pw: "1234", rbxId: 1, role: "최고 관리자" };
        
        // 로컬 브라우저 세션에 보관할 가상 계정 DB 초기화
        let accountDB = JSON.parse(localStorage.getItem("tcms_accounts")) || [
            { id: "admin", rbxId: 1, role: "최고 관리자" },
            { id: "operator1", rbxId: 156, role: "일반 관제원" }
        ];
        
        // 가상 패스워드 테이블 관리 (데모용 유효성 체크를 위함)
        let pwdDB = { "admin": "1234", "operator1": "1234" };

        let currentUserSession = null;
        const ROBLOX_MAP_BOUNDS = { minX: -3000, maxX: 3000, minZ: -3000, maxZ: 3000 };

        // 뷰 체인저 스위칭 함수
        function switchView(viewId, element) {
            document.querySelectorAll('.view-section').forEach(sec => sec.classList.remove('active'));
            document.querySelectorAll('.menu-item').forEach(btn => btn.classList.remove('active'));
            
            document.getElementById(`view-${viewId}`).classList.add('active');
            element.classList.add('active');

            const titles = { dashboard: "실시간 기차 통합 대시보드", accounts: "관제원 계정 및 권한 관리 매니저", logs: "통합 보안 감사 로그 모니터" };
            document.getElementById('nav-title').innerText = titles[viewId] || "통합 관제 시스템";
        }

        // 로그인 처리 엔진
        function handleLogin() {
            const inputId = document.getElementById('login-id').value.trim();
            const inputPw = document.getElementById('login-pw').value.trim();

            if(inputId === MASTER_ADMIN.id && inputPw === MASTER_ADMIN.pw) {
                currentUserSession = MASTER_ADMIN;
            } else if(pwdDB[inputId] && pwdDB[inputId] === inputPw) {
                const found = accountDB.find(u => u.id === inputId);
                currentUserSession = { id: found.id, rbxId: found.rbxId, role: found.role };
            } else {
                alert("인증에 실패했습니다. 아이디 또는 비밀번호를 확인하세요.");
                return;
            }

            // 세션UI 연동 및 아바타 새로고침
            document.getElementById('auth-overlay').style.display = 'none';
            document.getElementById('session-username').innerText = currentUserSession.id;
            document.getElementById('session-role').innerText = currentUserSession.role;
            document.getElementById('my-avatar').src = `https://thumbnails.roblox.com/v1/users/avatar-headshot?userIds=${currentUserSession.rbxId}&size=150x150&format=Png&isCircular=true`;

            // 최고 관리자가 아니면 계정 생성 메뉴 차단 숨김 처리
            if(currentUserSession.role !== "최고 관리자") {
                document.getElementById('menu-accounts').style.display = 'none';
            } else {
                document.getElementById('menu-accounts').style.display = 'flex';
            }

            addLog("System", `계정 [${currentUserSession.id}] 관제 센터 세션 로그인 성공.`);
            renderAccounts();
        }

        function handleLogout() {
            currentUserSession = null;
            document.getElementById('login-id').value = "";
            document.getElementById('login-pw').value = "";
            document.getElementById('auth-overlay').style.display = 'flex';
        }

        // 새 하위 계정 생성 프로세스
        function createNewAccount() {
            if(!currentUserSession || currentUserSession.role !== "최고 Manager" && currentUserSession.id !== "admin") {
                alert("계정을 생성할 권한이 없습니다.");
                return;
            }

            const newId = document.getElementById('new-user-id').value.trim();
            const newPw = document.getElementById('new-user-pw').value.trim();
            const newRbx = parseInt(document.getElementById('new-user-rbx').value) || 1;

            if(!newId || !newPw) return alert("아이디와 비밀번호를 모두 올바르게 채워주십시오.");
            if(accountDB.some(u => u.id === newId)) return alert("이미 존재하는 계정 아이디입니다.");

            const newAcc = { id: newId, rbxId: newRbx, role: "일반 관제원" };
            accountDB.push(newAcc);
            pwdDB[newId] = newPw;

            localStorage.setItem("tcms_accounts", JSON.stringify(accountDB));
            
            document.getElementById('new-user-id').value = "";
            document.getElementById('new-user-pw').value = "";
            
            renderAccounts();
            addLog(currentUserSession.id, `새로운 하위 관제원 계정 발급 완료 (ID: ${newId}, RobloxID: ${newRbx})`);
            alert(`관제원 계정 [${newId}]이 성공적으로 발급되었습니다.`);
        }

        // 계정 테이블 렌더링
        function renderAccounts() {
            const tbody = document.getElementById('account-table-body');
            tbody.innerHTML = "";
            accountDB.forEach(u => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><img src="https://thumbnails.roblox.com/v1/users/avatar-headshot?userIds=${u.rbxId}&size=150x150&format=Png&isCircular=true" style="width:32px; height:32px; border-radius:50%; border:1px solid var(--primary);"></td>
                    <td style="font-weight:bold;">${u.id}</td>
                    <td>${u.rbxId}</td>
                    <td><span style="color:${u.role === '최고 관리자' ? 'var(--primary)': 'var(--text-muted)'}">${u.role}</span></td>
                    <td><span class="status-badge status-normal" style="padding: 2px 6px; font-size:11px;">활성화됨</span></td>
                `;
                tbody.appendChild(tr);
            });
        }

        // 로그 시스템
        function addLog(user, message) {
            const container = document.getElementById('log-display-container');
            const now = new Date();
            const timeStr = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}:${now.getSeconds().toString().padStart(2,'0')}`;
            
            const logLine = document.createElement('div');
            logLine.className = 'log-line';
            logLine.innerHTML = `<span class="log-time">[${timeStr}]</span><span class="log-user">@${user}</span> <span style="color:#fff;">${message}</span>`;
            
            container.appendChild(logLine);
            container.scrollTop = container.scrollHeight;
        }

        // 실시간 대시보드 동기화 코어 루틴[cite: 11]
        async function updateDashboard() {
            if(!currentUserSession) return; // 로그인 상태가 아니면 대기

            try {
                const res = await fetch('/api/current-data');
                const trains = await res.json();

                const grid = document.getElementById('dashboard-grid');
                const map = document.getElementById('live-map');
                const noTrainsMsg = document.getElementById('no-trains-msg');

                const currentIds = Object.keys(trains);

                if (currentIds.length === 0) {
                    grid.innerHTML = '<div class="no-trains" id="no-trains-msg">네트워크 연결 대기 중이거나 운행 중인 열차가 없습니다.</div>';
                    map.innerHTML = '';
                    return;
                }

                if (noTrainsMsg) noTrainsMsg.remove();

                // 1. 디스폰된 열차 클리어[cite: 11]
                document.querySelectorAll('.train-card').forEach(card => {
                    if (!trains[card.dataset.id]) card.remove();
                });
                document.querySelectorAll('.train-marker').forEach(marker => {
                    if (!trains[marker.dataset.id]) marker.remove();
                });

                // 2. 다중 열차 실시간 렌더링[cite: 11]
                for (const id in trains) {
                    const train = trains[id];
                    const isEms = train.IsEmergency || train.remoteEmergencyActive;

                    // 마커 관리[cite: 11]
                    let marker = document.querySelector(`.train-marker[data-id="${id}"]`);
                    if (!marker) {
                        marker = document.createElement('div');
                        marker.className = 'train-marker';
                        marker.dataset.id = id;
                        const label = document.createElement('div');
                        label.className = 'train-marker-label';
                        marker.appendChild(label);
                        map.appendChild(marker);
                    }
                    
                    if (isEms) marker.classList.add('ems');
                    else marker.classList.remove('ems');

                    let pctX = ((train.PositionX - ROBLOX_MAP_BOUNDS.minX) / (ROBLOX_MAP_BOUNDS.maxX - ROBLOX_MAP_BOUNDS.minX)) * 100;
                    let pctZ = ((train.PositionZ - ROBLOX_MAP_BOUNDS.minZ) / (ROBLOX_MAP_BOUNDS.maxZ - ROBLOX_MAP_BOUNDS.minZ)) * 100;
                    marker.style.left = `${Math.max(0, Math.min(100, pctX))}%`;
                    marker.style.top = `${Math.max(0, Math.min(100, pctZ))}%`;
                    marker.querySelector('.train-marker-label').innerText = `${train.TrainName.split(' ')[0]} (${train.CurrentSpeed}km/h)`;

                    // 제어 카드 바인딩[cite: 11]
                    let card = document.querySelector(`.train-card[data-id="${id}"]`);
                    if (!card) {
                        card = document.createElement('div');
                        card.className = 'train-card';
                        card.dataset.id = id;
                        card.innerHTML = `
                            <div>
                                <div class="card-header">
                                    <span class="v-name"></span>
                                    <span class="train-id">ID: ${id}</span>
                                </div>
                                <div class="info-row"><span class="info-label">현재 속도</span><span class="info-value v-speed">0 km/h</span></div>
                                <div class="info-row"><span class="info-label">제어 단수</span><span class="info-value v-notch">N</span></div>
                                <div class="info-row"><span class="info-label">역전기 방향</span><span class="info-value v-rev">중립 (N)</span></div>
                                <div class="info-row"><span class="info-label">현재 좌표 (X, Z)</span><span class="info-value v-pos" style="color:var(--text-muted);">0, 0</span></div>
                                <div class="limit-input-zone">
                                    <span style="font-size:13px; font-weight:500;">ATC 제한속도 변경</span>
                                    <div>
                                        <input type="number" class="limit-input" value="${train.SpeedLimit || 80}">
                                        <button class="btn-sm btn btn-primary" style="padding:6px 10px; display:inline-block;" onclick="setSpeedLimit('${id}', this)"><i class="fa-solid fa-check"></i></button>
                                    </div>
                                </div>
                                <div class="info-row" style="align-items:center; margin-top:15px;">
                                    <span class="info-label">안전 상태</span>
                                    <span class="status-badge v-badge">정상</span>
                                </div>
                            </div>
                            <div>
                                <div class="driver-zone">
                                    <img class="avatar v-avatar" src="" alt="Driver">
                                    <div class="driver-meta">
                                        <span class="driver-name v-driver">대기 중</span>
                                        <span style="font-size:11px; color:var(--text-muted);">Roblox 기장</span>
                                    </div>
                                </div>
                                <div class="control-zone">
                                    <button class="btn btn-danger" onclick="triggerEmergency('${id}')"><i class="fa-solid fa-triangle-exclamation"></i> 비상정지</button>
                                    <button class="btn btn-safe" onclick="resetEmergency('${id}')"><i class="fa-solid fa-lock-open"></i> 해제</button>
                                </div>
                            </div>
                        `;
                        grid.appendChild(card);
                    }

                    // 속도 및 제어단수 매핑[cite: 11]
                    card.querySelector('.v-name').innerText = train.TrainName;
                    card.querySelector('.v-speed').innerText = `${train.CurrentSpeed} km/h (제한: ${train.SpeedLimit || 80} km/h)`;
                    
                    let notchText = "N";
                    if (train.CurrentNotch > 0) notchText = "P" + train.CurrentNotch;
                    else if (train.CurrentNotch < 0) notchText = (train.CurrentNotch === -5) ? "EB (비상)" : "B" + Math.abs(train.CurrentNotch);
                    card.querySelector('.v-notch').innerText = notchText;

                    let revText = "중립 (N)";
                    if (train.CurrentReverser === 1) revText = "전진 (F)";
                    else if (train.CurrentReverser === -1) revText = "후진 (B)";
                    card.querySelector('.v-rev').innerText = revText;
                    card.querySelector('.v-pos').innerText = `${train.PositionX}, ${train.PositionZ}`;

                    const badge = card.querySelector('.v-badge');
                    if (train.remoteEmergencyActive) {
                        badge.className = "status-badge status-ems";
                        badge.innerText = "원격 강제 제동";
                    } else if (train.IsEmergency) {
                        badge.className = "status-badge status-ems";
                        badge.innerText = "과속/비상 정지 체결";
                    } else {
                        badge.className = "status-badge status-normal";
                        badge.innerText = "정상 신호 운영";
                    }

                    const targetUserId = train.DriverId > 0 ? train.DriverId : 1; 
                    card.querySelector('.v-avatar').src = `https://thumbnails.roblox.com/v1/users/avatar-headshot?userIds=${targetUserId}&size=150x150&format=Png&isCircular=true`;
                    card.querySelector('.v-driver').innerText = train.DriverName || '승무원 없음';
                }
            } catch (e) {
                console.error("대시보드 동기화 대기 중...", e);
            }
        }

        // 각 통제 액션 및 로그 수집[cite: 11]
        async function setSpeedLimit(trainId, buttonObj) {
            const inputVal = parseInt(buttonObj.previousElementSibling.value);
            if(isNaN(inputVal) || inputVal < 0) return alert("올바른 속도를 입력하세요.");
            
            await fetch('/api/web-speedlimit', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ trainId: trainId, speedLimit: inputVal })
            });
            addLog(currentUserSession.id, `열차 [${trainId}] ATC 제한속도를 ${inputVal}km/h로 수정 지시.`);
        }

        async function triggerEmergency(trainId) {
            await fetch('/api/web-emergency', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ trainId: trainId })
            });
            addLog(currentUserSession.id, `⚠️ 열차 [${trainId}]에 대시보드 원격 비상 정지(EMS) 명령 강제 전송!`);
        }

        async function resetEmergency(trainId) {
            await fetch('/api/web-reset', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ trainId: trainId })
            });
            addLog(currentUserSession.id, `✅ 열차 [${trainId}] 원격 비상 상태 해제 신호 전송 완료.`);
        }

        // 실시간 폴링 루프 가동[cite: 11]
        setInterval(updateDashboard, 100);
        
        // 초기 임시 로그 
        addLog("System", "통합 철도 관제 운영 인프라 서버 초기화 완료.");
    </script>
</body>

</html>
