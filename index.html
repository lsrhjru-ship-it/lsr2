<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로블록스 차세대 통합 관제 시스템</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Noto+Sans+KR:wght@300;500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bcryptjs/2.4.3/bcrypt.min.js"></script>

    <style>
        :root {
            --bg-color: #05060f;
            --panel-bg: rgba(18, 20, 36, 0.7);
            --panel-border: rgba(88, 166, 255, 0.15);
            --primary: #58a6ff;
            --accent: #00f2fe;
            --danger: #ff4d6d;
            --danger-glow: rgba(255, 77, 109, 0.4);
            --success: #2ecc71;
            --text-main: #f1f2f6;
            --text-muted: #8b949e;
        }

        * {
            box-sizing: border-box;
            font-family: 'Noto Sans KR', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
            background-image:
                radial-gradient(circle at 15% 50%, rgba(88, 166, 255, 0.04), transparent 30%),
                radial-gradient(circle at 85% 30%, rgba(0, 242, 254, 0.04), transparent 30%);
        }

        /* 로그인 인증 레이어 */
        #auth-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(5, 6, 15, 0.95);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(12px);
        }

        .auth-card {
            background: linear-gradient(180deg, rgba(25, 27, 48, 0.9), rgba(18, 20, 36, 0.9));
            border: 1px solid var(--panel-border);
            padding: 40px;
            border-radius: 16px;
            width: 400px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        .auth-card h2 {
            font-family: 'Orbitron', sans-serif;
            color: var(--primary);
            margin-bottom: 30px;
            letter-spacing: 2px;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 6px;
        }

        .form-control {
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px;
            border-radius: 8px;
            color: white;
            font-size: 15px;
            transition: 0.3s;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 10px rgba(88, 166, 255, 0.3);
        }

        /* 좌측 사이드바 */
        .sidebar {
            width: 280px;
            background: rgba(13, 17, 23, 0.95);
            border-right: 1px solid var(--panel-border);
            display: flex;
            flex-direction: column;
            padding: 20px;
            z-index: 100;
        }

        .sidebar-brand {
            font-family: 'Orbitron', sans-serif;
            font-size: 20px;
            font-weight: 900;
            color: var(--primary);
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .user-profile-box {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            padding: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 25px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .user-profile-box img {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: #151622;
            border: 2px solid var(--primary);
            object-fit: cover;
        }

        .user-info .u-name {
            font-weight: bold;
            font-size: 14px;
        }

        .user-info .u-role {
            font-size: 11px;
            color: var(--accent);
        }

        .menu-item {
            padding: 12px 16px;
            border-radius: 8px;
            color: var(--text-muted);
            cursor: pointer;
            margin-bottom: 8px;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 500;
        }

        .menu-item:hover,
        .menu-item.active {
            background: rgba(88, 166, 255, 0.1);
            color: var(--primary);
            border-left: 4px solid var(--primary);
        }

        .btn {
            padding: 12px;
            font-size: 13px;
            font-weight: 700;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .btn-primary {
            background: var(--primary);
            color: #000;
        }

        .btn-primary:hover {
            background: #6cb3ff;
        }

        .btn-danger {
            background: var(--danger);
            box-shadow: 0 4px 12px rgba(255, 77, 109, 0.2);
        }

        .btn-danger:hover {
            background: #e0435f;
        }

        .btn-safe {
            background: var(--success);
        }

        .btn-safe:hover {
            background: #27ae60;
        }

        /* 우측 메인 콘텐츠 레이아웃 */
        .main-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .top-navbar {
            height: 70px;
            background: rgba(13, 17, 23, 0.6);
            border-bottom: 1px solid var(--panel-border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
            backdrop-filter: blur(10px);
        }

        .top-navbar h1 {
            font-size: 18px;
            margin: 0;
            font-weight: 500;
        }

        .content-body {
            flex: 1;
            padding: 25px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .view-section {
            display: none;
            flex-direction: column;
            gap: 25px;
        }

        .view-section.active {
            display: flex;
        }

        /* 관제 맵 레이아웃 */
        .map-section {
            background: var(--panel-bg);
            border-radius: 16px;
            border: 1px solid var(--panel-border);
            padding: 20px;
        }

        .section-title {
            font-size: 15px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .map-container {
            width: 100%;
            height: 420px;
            background: #010409;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            position: relative;
            overflow: hidden;
        }

        .map-container::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: linear-gradient(rgba(88, 166, 255, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(88, 166, 255, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            pointer-events: none;
            z-index: 1;
        }

        .train-marker {
            position: absolute;
            width: 16px;
            height: 16px;
            background: var(--accent);
            border: 3px solid #fff;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: left 0.2s ease, top 0.2s ease;
            box-shadow: 0 0 12px var(--accent);
            z-index: 10;
        }

        .train-marker.ems {
            background: var(--danger);
            box-shadow: 0 0 15px var(--danger);
            animation: marker-blink 0.6s infinite alternate;
        }

        .train-marker-label {
            position: absolute;
            top: -26px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.9);
            color: #fff;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: bold;
            white-space: nowrap;
            border: 1px solid var(--primary);
            pointer-events: none;
        }

        /* 열차 현황 카드 */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 25px;
        }

        .train-card {
            background: linear-gradient(180deg, rgba(25, 27, 48, 0.9), rgba(18, 20, 36, 0.9));
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 24px;
            backdrop-filter: blur(15px);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: 0.3s;
        }

        .train-card:hover {
            border-color: var(--primary);
            box-shadow: 0 0 20px rgba(88, 166, 255, 0.15);
            transform: translateY(-3px);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            padding-bottom: 12px;
            margin-bottom: 16px;
        }

        .v-name {
            font-size: 17px;
            font-weight: 700;
            color: #fff;
        }

        .train-id {
            font-size: 11px;
            color: var(--text-muted);
            font-family: 'Orbitron', sans-serif;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            font-size: 14px;
        }

        .info-label {
            color: var(--text-muted);
        }

        .info-value {
            font-weight: 700;
            color: var(--accent);
        }

        .limit-input-zone {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(0, 0, 0, 0.2);
            padding: 10px 14px;
            border-radius: 8px;
            margin: 15px 0;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .limit-input {
            width: 65px;
            background: #010409;
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #fff;
            padding: 6px;
            border-radius: 6px;
            text-align: center;
            font-weight: bold;
        }

        .limit-input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .driver-zone {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(255, 255, 255, 0.02);
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 16px;
            border: 1px solid rgba(255, 255, 255, 0.04);
        }

        .avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: 2px solid var(--primary);
            background: #000;
            object-fit: cover;
        }

        .driver-meta {
            display: flex;
            flex-direction: column;
        }

        .driver-name {
            font-weight: 700;
            font-size: 14px;
        }

        .control-zone {
            display: flex;
            gap: 8px;
        }

        .control-zone .btn {
            flex: 1;
            padding: 10px 4px;
            font-size: 11px;
        }

        .status-badge {
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 700;
        }

        .status-normal {
            background: rgba(46, 204, 113, 0.15);
            color: var(--success);
            border: 1px solid var(--success);
        }

        .status-ems {
            background: rgba(255, 77, 109, 0.15);
            color: var(--danger);
            border: 1px solid var(--danger);
            animation: card-blink 1s infinite alternate;
        }

        /* 계정 관리 및 로그 스타일 */
        .card-table-wrap {
            background: var(--panel-bg);
            border-radius: 16px;
            border: 1px solid var(--panel-border);
            padding: 24px;
        }

        .admin-flex {
            display: flex;
            gap: 30px;
            align-items: flex-start;
        }

        .admin-form {
            width: 320px;
            background: rgba(0, 0, 0, 0.2);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .custom-table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            margin-top: 10px;
        }

        .custom-table th,
        .custom-table td {
            padding: 14px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }

        .custom-table th {
            color: var(--text-muted);
            font-weight: 500;
            font-size: 13px;
        }

        .log-box {
            background: #010409;
            border-radius: 12px;
            padding: 15px;
            height: 500px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            line-height: 1.6;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .log-line {
            margin-bottom: 8px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.02);
            padding-bottom: 4px;
        }

        .log-time {
            color: var(--primary);
            margin-right: 10px;
        }

        .log-user {
            color: var(--accent);
            font-weight: bold;
            margin-right: 6px;
        }

        .no-trains {
            text-align: center;
            color: var(--text-muted);
            font-size: 15px;
            padding: 60px 0;
            width: 100%;
            grid-column: 1 / -1;
        }

        @keyframes card-blink {
            0% {
                box-shadow: 0 0 4px var(--danger-glow);
            }
            100% {
                box-shadow: 0 0 16px var(--danger-glow);
            }
        }

        @keyframes marker-blink {
            0% {
                transform: translate(-50%, -50%) scale(0.9);
            }
            100% {
                transform: translate(-50%, -50%) scale(1.2);
            }
        }
    </style>
</head>

<body>
    <div id="auth-overlay">
        <div class="auth-card">
            <h2>TCMS LOGIN</h2>
            <div class="form-group">
                <label><i class="fa-solid fa-user"></i> 관리자 아이디</label>
                <input type="text" id="login-id" class="form-control" placeholder="ID를 입력하세요">
            </div>
            <div class="form-group">
                <label><i class="fa-solid fa-lock"></i> 비밀번호</label>
                <input type="password" id="login-pw" class="form-control" placeholder="Password를 입력하세요"
                    onkeyup="if(event.key==='Enter') handleLogin()">
            </div>
            <button class="btn btn-primary" style="width:100%; margin-top:10px;" onclick="handleLogin()">시스템 접속</button>
        </div>
    </div>

    <div class="sidebar">
        <div class="sidebar-brand">
            <i class="fa-solid fa-circle-nodes"></i> NEXT-TCMS
        </div>

        <div class="user-profile-box">
            <img id="my-avatar" src="https://upload.wikimedia.org/wikipedia/commons/a/ac/Default_pfp.jpg" alt="Avatar">
            <div class="user-info">
                <div class="u-name" id="session-username">대기 중</div>
                <div class="u-role" id="session-role">-</div>
            </div>
        </div>

        <div class="menu-item active" onclick="switchView('dashboard', this)"><i class="fa-solid fa-chart-line"></i> 실시간 통합 관제</div>
        <div class="menu-item" id="menu-accounts" onclick="switchView('accounts', this)"><i class="fa-solid fa-users-gear"></i> 계정 및 권한 관리</div>
        <div class="menu-item" onclick="switchView('logs', this)"><i class="fa-solid fa-file-shield"></i> 시스템 감사 로그</div>

        <button class="btn btn-danger" style="margin-top: auto; padding: 12px; width: 100%;" onclick="handleLogout()">
            <i class="fa-solid fa-right-from-bracket"></i> 로그아웃
        </button>
    </div>

    <div class="main-wrapper">
        <div class="top-navbar">
            <h1 id="nav-title">실시간 기차 통합 대시보드</h1>
            <div><span style="font-size:13px; color:var(--text-muted);"><i class="fa-solid fa-clock"></i> SYSTEM LIVE</span></div>
        </div>

        <div class="content-body">
            <div id="view-dashboard" class="view-section active">
                <div class="map-section">
                    <div class="section-title"><i class="fa-solid fa-map-location-dot"></i> Live Tracking Display Map</div>
                    <div class="map-container" id="live-map">
                        <svg id="track-svg" style="width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 1; pointer-events: none;"></svg>
                        <div id="train-markers-layer" style="position: absolute; width: 100%; height: 100%; top: 0; left: 0; z-index: 2; pointer-events: none;"></div>
                    </div>
                </div>
                <div class="grid-container" id="dashboard-grid">
                    <div class="no-trains" id="no-trains-msg">네트워크 연결 대기 중이거나 운행 중인 열차가 없습니다.</div>
                </div>
            </div>

            <div id="view-accounts" class="view-section">
                <div class="card-table-wrap">
                    <div class="section-title" id="form-main-title"><i class="fa-solid fa-user-plus"></i> 신규 하위 관제 계정 발급 시스템</div>
                    <div class="admin-flex">
                        <div class="admin-form" id="account-form">
                            <h3 id="form-action-title" style="margin-top:0; font-size:14px; color:var(--primary); margin-bottom:15px;">계정 생성</h3>
                            <div class="form-group">
                                <label>관제원 ID</label>
                                <input type="text" id="new-user-id" class="form-control" placeholder="아이디 지정">
                            </div>
                            <div class="form-group">
                                <label>비밀번호</label>
                                <input type="password" id="new-user-pw" class="form-control" placeholder="비밀번호 지정">
                            </div>
                            <div class="form-group">
                                <label>연동할 로블록스 UserID</label>
                                <input type="number" id="new-user-rbx" class="form-control" value="1">
                            </div>
                            <div class="form-group">
                                <label>권한 등급 설정</label>
                                <select id="new-user-role" class="form-control" style="background:#000; color:#fff; cursor: pointer;">
                                    <option value="일반 관제원">일반 관제원</option>
                                    <option value="최고 관리자">최고 관리자</option>
                                </select>
                            </div>
                            <div style="display:flex; gap:10px;">
                                <button id="btn-submit" class="btn btn-primary" style="flex:1; margin-top: 10px;" onclick="submitAccountForm()">계정 생성 및 발급</button>
                                <button id="btn-cancel" class="btn btn-danger" style="flex:1; margin-top: 10px; display:none;" onclick="cancelEditMode()">취소</button>
                            </div>
                        </div>
                        <div style="flex: 1;">
                            <table class="custom-table">
                                <thead>
                                    <tr>
                                        <th>아바타</th>
                                        <th>관제원 계정 ID</th>
                                        <th>연동 로블록스 ID</th>
                                        <th>권한 레벨</th>
                                        <th>상태</th>
                                        <th>액션</th>
                                    </tr>
                                </thead>
                                <tbody id="account-table-body"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>

            <div id="view-logs" class="view-section">
                <div class="card-table-wrap">
                    <div class="section-title"><i class="fa-solid fa-terminal"></i> 실시간 관제 통제 및 명령어 감사 로그</div>
                    <div class="log-box" id="log-display-container"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const MASTER_ADMIN_ID = "lsrhjru";
        const FALLBACK_AVATAR = "https://upload.wikimedia.org/wikipedia/commons/a/ac/Default_pfp.jpg";

        let ROBLOX_MAP_BOUNDS = { minX: -3000, maxX: 3000, minZ: -3000, maxZ: 3000 };
        let accountDB = [];
        let currentUserSession = null;
        let lastRenderedLogCount = 0;
        let isEditMode = false;
        let editingTargetId = null;

        const robloxCache = {};
        const robloxPromises = {};

        function hasAdminPrivilege(user) {
            if (!user) return false;
            return user.id === MASTER_ADMIN_ID || user.role === "최고 관리자";
        }

        async function getRobloxProfile(rbxId) {
            const id = parseInt(rbxId) || 1;
            if (robloxCache[id]) return robloxCache[id];
            if (robloxPromises[id]) return robloxPromises[id];

            robloxPromises[id] = (async () => {
                try {
                    const res = await fetch(`/api/roblox/user/${id}?t=${Date.now()}`, { cache: 'no-store' });
                    if (!res.ok) throw new Error(`HTTP error! status: ${res.status}`);
                    const data = await res.json();
                    robloxCache[id] = data;
                    return data;
                } catch (e) {
                    const fallback = { username: `ID: ${id}`, avatarUrl: FALLBACK_AVATAR };
                    robloxCache[id] = fallback;
                    return fallback;
                } finally {
                    delete robloxPromises[id];
                }
            })();
            return robloxPromises[id];
        }

        window.onload = async () => {
            await fetchTrackLayout();
            await fetchAccounts();
        };

        async function fetchTrackLayout() {
            try {
                const res = await fetch(`/api/track-layout?t=${Date.now()}`, { cache: 'no-store' });
                if (res.ok) {
                    const data = await res.json();
                    if (data) {
                        if (data.bounds) ROBLOX_MAP_BOUNDS = data.bounds;
                        if (data.segments && data.segments.length > 0) drawTracks(data.segments);
                    }
                }
            } catch (e) {
                console.error("선로 레이아웃을 가져오지 못했습니다.", e);
            }
        }

        function drawTracks(segments) {
            const svg = document.getElementById('track-svg');
            if (!svg) return;
            svg.innerHTML = "";
            segments.forEach(seg => {
                const x1Pct = ((seg.x1 - ROBLOX_MAP_BOUNDS.minX) / (ROBLOX_MAP_BOUNDS.maxX - ROBLOX_MAP_BOUNDS.minX)) * 100;
                const z1Pct = ((seg.z1 - ROBLOX_MAP_BOUNDS.minZ) / (ROBLOX_MAP_BOUNDS.maxZ - ROBLOX_MAP_BOUNDS.minZ)) * 100;
                const x2Pct = ((seg.x2 - ROBLOX_MAP_BOUNDS.minX) / (ROBLOX_MAP_BOUNDS.maxX - ROBLOX_MAP_BOUNDS.minX)) * 100;
                const z2Pct = ((seg.z2 - ROBLOX_MAP_BOUNDS.minZ) / (ROBLOX_MAP_BOUNDS.maxZ - ROBLOX_MAP_BOUNDS.minZ)) * 100;

                const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
                line.setAttribute("x1", `${x1Pct}%`);
                line.setAttribute("y1", `${z1Pct}%`);
                line.setAttribute("x2", `${x2Pct}%`);
                line.setAttribute("y2", `${z2Pct}%`);
                line.setAttribute("stroke", "rgba(88, 166, 255, 0.25)");
                line.setAttribute("stroke-width", "3.5");
                line.setAttribute("stroke-linecap", "round");
                line.style.filter = "drop-shadow(0px 0px 1px rgba(88, 166, 255, 0.4))";
                svg.appendChild(line);
            });
        }

        async function fetchAccounts() {
            try {
                const res = await fetch(`/api/accounts?t=${Date.now()}`, { cache: 'no-store' });
                if (!res.ok) throw new Error("계정 목록 로드 실패");
                accountDB = await res.json();
                renderAccounts();
            } catch (e) {
                console.error("서버에서 계정 목록을 가져오지 못했습니다.", e);
            }
        }

        function switchView(viewId, element) {
            document.querySelectorAll('.view-section').forEach(sec => sec.classList.remove('active'));
            document.querySelectorAll('.menu-item').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`view-${viewId}`).classList.add('active');
            element.classList.add('active');
            const titles = { dashboard: "실시간 기차 통합 대시보드", accounts: "계정 및 시스템 권한 관리", logs: "통합 보안 감사 로그 모니터" };
            document.getElementById('nav-title').innerText = titles[viewId] || "통합 관제 시스템";
        }

        async function handleLogin() {
            const idInput = document.getElementById('login-id');
            const pwInput = document.getElementById('login-pw');
            const inputId = idInput.value.trim();
            const inputPw = pwInput.value.trim();

            if (!inputId || !inputPw) { alert("ID와 비밀번호를 입력하세요."); return; }

            await fetchAccounts();
            const found = accountDB.find(u => {
                if (u.id !== inputId) return false;
                try {
                    if (u.pw.startsWith('$2')) return bcrypt.compareSync(inputPw, u.pw);
                } catch (err) { }
                return u.pw === inputPw;
            });

            if (found) {
                currentUserSession = found;
                document.getElementById('auth-overlay').style.display = 'none';
                document.getElementById('session-role').innerText = currentUserSession.role;
                const profile = await getRobloxProfile(currentUserSession.rbxId);
                document.getElementById('my-avatar').src = profile.avatarUrl;
                document.getElementById('session-username').innerText = profile.username;
                document.getElementById('menu-accounts').style.display = hasAdminPrivilege(currentUserSession) ? 'flex' : 'none';
                await fetchTrackLayout();
            } else {
                alert("인증에 실패했습니다.");
            }
        }

        function handleLogout() {
            currentUserSession = null;
            document.getElementById('auth-overlay').style.display = 'flex';
            switchView('dashboard', document.querySelector('.menu-item'));
        }

        function submitAccountForm() {
            if (isEditMode) updateExistingAccount();
            else createNewAccount();
        }

        async function createNewAccount() {
            if (!hasAdminPrivilege(currentUserSession)) return alert("권한이 없습니다.");
            const id = document.getElementById('new-user-id').value;
            const pw = document.getElementById('new-user-pw').value;
            const rbxId = document.getElementById('new-user-rbx').value;
            const role = document.getElementById('new-user-role').value;

            try {
                const res = await fetch('/api/accounts', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id, pw, rbxId, role, adminId: currentUserSession.id })
                });
                const data = await res.json();
                if (data.error) alert(data.error);
                else { alert("계정 생성 완료"); clearForm(); await fetchAccounts(); }
            } catch (e) { }
        }

        function startEditMode(id, rbxId, role) {
            isEditMode = true;
            editingTargetId = id;
            document.getElementById('new-user-id').value = id;
            document.getElementById('new-user-id').disabled = true;
            document.getElementById('new-user-rbx').value = rbxId;
            document.getElementById('new-user-role').value = role;
            document.getElementById('btn-submit').innerText = "수정 완료";
            document.getElementById('btn-cancel').style.display = "block";
        }

        function clearForm() {
            isEditMode = false;
            document.getElementById('new-user-id').value = "";
            document.getElementById('new-user-id').disabled = false;
            document.getElementById('new-user-pw').value = "";
            document.getElementById('btn-submit').innerText = "계정 생성 및 발급";
            document.getElementById('btn-cancel').style.display = "none";
        }

        async function updateExistingAccount() {
            if (!hasAdminPrivilege(currentUserSession)) return;
            const pw = document.getElementById('new-user-pw').value;
            const rbxId = document.getElementById('new-user-rbx').value;
            const role = document.getElementById('new-user-role').value;
            const payload = { rbxId, role, adminId: currentUserSession.id, ...(pw && { pw }) };

            try {
                await fetch(`/api/accounts/${editingTargetId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                alert("수정 완료");
                clearForm();
                await fetchAccounts();
            } catch (e) { }
        }

        async function deleteAccount(id) {
            if (!confirm(`정말로 삭제하시겠습니까?`)) return;
            try {
                await fetch(`/api/accounts/${id}`, {
                    method: 'DELETE',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ adminId: currentUserSession.id })
                });
                await fetchAccounts();
            } catch (e) { }
        }

        function renderAccounts() {
            const tbody = document.getElementById('account-table-body');
            tbody.innerHTML = "";
            accountDB.forEach(u => {
                const isSuperAdmin = (u.role === '최고 관리자' || u.id === MASTER_ADMIN_ID);
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><img src="${FALLBACK_AVATAR}" style="width:32px; height:32px; border-radius:50%; border:1px solid var(--primary);"></td>
                    <td>${u.id}</td>
                    <td>${u.rbxId}</td>
                    <td>${u.role}</td>
                    <td>활성화</td>
                    <td>${isSuperAdmin ? '-' : `<button onclick="startEditMode('${u.id}', ${u.rbxId}, '${u.role}')">수정</button> <button onclick="deleteAccount('${u.id}')">삭제</button>`}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        async function updateDashboard() {
            if (!currentUserSession) return;
            try {
                const res = await fetch(`/api/current-data?t=${Date.now()}`);
                const data = await res.json();
                // (이하 생략 - 이전 대시보드 로직 유지)
            } catch (e) { }
        }

        setInterval(updateDashboard, 1000);
    </script>
</body>
