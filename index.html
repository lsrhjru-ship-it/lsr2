<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>NEXT-TCMS 통합 관제 시스템</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Noto+Sans+KR:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #05060f; --panel-bg: rgba(18, 20, 36, 0.8);
            --primary: #58a6ff; --accent: #00f2fe; --danger: #ff4d6d;
            --success: #2ecc71; --text-main: #f1f2f6; --text-muted: #8b949e;
        }
        body { background: var(--bg-color); color: var(--text-main); margin: 0; display: flex; height: 100vh; font-family: 'Noto Sans KR', sans-serif; overflow: hidden; }
        
        /* 로그인 */
        #auth-overlay { position: fixed; inset: 0; background: rgba(5,6,15,0.98); z-index: 9999; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(15px); }
        .auth-card { background: #121424; padding: 40px; border-radius: 16px; border: 1px solid var(--primary); width: 350px; text-align: center; }
        
        /* 레이아웃 */
        .sidebar { width: 280px; background: #0d1117; border-right: 1px solid #30363d; display: flex; flex-direction: column; padding: 20px; }
        .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .top-nav { height: 60px; background: rgba(13,17,23,0.8); border-bottom: 1px solid #30363d; display: flex; align-items: center; padding: 0 30px; justify-content: space-between; }
        
        .content { flex: 1; padding: 20px; overflow-y: auto; }
        .view-section { display: none; flex-direction: column; gap: 20px; }
        .view-section.active { display: flex; }

        /* 열차 카드 디자인 */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 20px; }
        .train-card { background: #161b22; border-radius: 12px; border: 1px solid #30363d; padding: 20px; transition: 0.2s; position: relative; }
        .train-card.ems { border-color: var(--danger); box-shadow: 0 0 15px rgba(255,77,109,0.2); }
        
        .card-header { display: flex; justify-content: space-between; margin-bottom: 15px; border-bottom: 1px solid #30363d; padding-bottom: 10px; }
        .info-row { display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 8px; }
        .v-value { color: var(--accent); font-weight: bold; }

        .btn { padding: 10px; border-radius: 6px; border: none; cursor: pointer; font-weight: bold; color: white; transition: 0.2s; }
        .btn-danger { background: var(--danger); width: 100%; }
        .btn-safe { background: var(--success); width: 100%; }
        .btn-primary { background: var(--primary); color: #000; }

        /* 로그 */
        .log-box { background: #010409; border: 1px solid #30363d; height: 500px; overflow-y: auto; padding: 15px; font-family: monospace; }
        .log-line { margin-bottom: 5px; border-bottom: 1px solid #ffffff05; padding-bottom: 3px; font-size: 13px; }
        .log-time { color: var(--primary); margin-right: 10px; }
        .log-user { color: var(--accent); font-weight: bold; }

        /* 맵 */
        .map-container { height: 300px; background: #010409; border: 1px solid #30363d; position: relative; border-radius: 12px; margin-bottom: 20px; }
        .marker { position: absolute; width: 12px; height: 12px; background: var(--accent); border-radius: 50%; transform: translate(-50%, -50%); transition: 0.5s; box-shadow: 0 0 10px var(--accent); }
    </style>
</head>
<body>

    <div id="auth-overlay">
        <div class="auth-card">
            <h2 style="font-family: Orbitron; color: var(--primary);">TCMS LOGIN</h2>
            <input type="text" id="login-id" placeholder="ID" style="width:100%; padding:10px; margin-bottom:10px; background:#000; border:1px solid #333; color:#fff;">
            <input type="password" id="login-pw" placeholder="PW" style="width:100%; padding:10px; margin-bottom:20px; background:#000; border:1px solid #333; color:#fff;">
            <button class="btn btn-primary" style="width:100%" onclick="handleLogin()">접속</button>
        </div>
    </div>

    <div class="sidebar">
        <h2 style="font-family: Orbitron; font-size: 18px; color: var(--primary);"><i class="fa-solid fa-train-subway"></i> NEXT-TCMS</h2>
        <div id="session-info" style="margin-bottom:30px; font-size:14px; color:var(--text-muted);">연결 대기 중...</div>
        <div onclick="switchView('dashboard')" style="cursor:pointer; padding:10px; border-radius:5px; background:rgba(88,166,255,0.1); margin-bottom:10px;"><i class="fa-solid fa-chart-line"></i> 실시간 관제</div>
        <div onclick="switchView('logs')" style="cursor:pointer; padding:10px; border-radius:5px;"><i class="fa-solid fa-file-shield"></i> 감사 로그</div>
        <button class="btn btn-danger" style="margin-top:auto" onclick="location.reload()">로그아웃</button>
    </div>

    <div class="main">
        <div class="top-nav"><h1 id="nav-title" style="font-size:18px;">실시간 통합 관제 대시보드</h1></div>
        <div class="content">
            <div id="view-dashboard" class="view-section active">
                <div class="map-container" id="live-map"></div>
                <div class="grid" id="train-grid"></div>
            </div>
            <div id="view-logs" class="view-section">
                <div class="log-box" id="log-display"></div>
            </div>
        </div>
    </div>

    <script>
        let currentUser = null;
        const MAP_BOUNDS = { min: -3000, max: 3000 };

        async function handleLogin() {
            const id = document.getElementById('login-id').value;
            const pw = document.getElementById('login-pw').value;
            const res = await fetch('/api/accounts');
            const accounts = await res.json();
            const user = accounts.find(a => a.id === id && a.pw === pw);
            if(user) {
                currentUser = user;
                document.getElementById('auth-overlay').style.display = 'none';
                document.getElementById('session-info').innerText = `@${user.id} (${user.role})`;
                startSync();
            } else alert("로그인 실패");
        }

        function switchView(v) {
            document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
            document.getElementById('view-' + v).classList.add('active');
        }

        async function startSync() {
            setInterval(async () => {
                // 1. 열차 데이터 동기화
                const res = await fetch('/api/current-data');
                const trains = await res.json();
                updateUI(trains);

                // 2. 로그 데이터 동기화
                const logRes = await fetch('/api/logs');
                const logs = await logRes.json();
                renderLogs(logs);
            }, 1000);
        }

        function updateUI(trains) {
            const grid = document.getElementById('train-grid');
            const map = document.getElementById('live-map');
            
            // 삭제된 열차 제거
            document.querySelectorAll('.train-card').forEach(card => {
                if(!trains[card.dataset.id]) card.remove();
            });
            document.querySelectorAll('.marker').forEach(m => {
                if(!trains[m.dataset.id]) m.remove();
            });

            for(const id in trains) {
                const train = trains[id];
                let card = document.querySelector(`.train-card[data-id="${id}"]`);
                if(!card) {
                    card = document.createElement('div');
                    card.className = 'train-card';
                    card.dataset.id = id;
                    grid.appendChild(card);
                }

                const isEmergency = train.IsEmergency || train.remoteEmergencyActive;
                card.className = `train-card ${isEmergency ? 'ems' : ''}`;
                
                card.innerHTML = `
                    <div class="card-header">
                        <span style="font-weight:bold;">${train.TrainName}</span>
                        <span style="font-size:10px; color:#8b949e;">${id}</span>
                    </div>
                    <div class="info-row"><span>현재 속도</span><span class="v-value">${train.CurrentSpeed} km/h</span></div>
                    <div class="info-row"><span>제한 속도</span><input type="number" value="${train.SpeedLimit}" onchange="setLimit('${id}', this.value)" style="width:50px; background:#000; color:#fff; border:1px solid #444;"></div>
                    <div class="info-row"><span>제어 상태</span><span class="v-value">${getNotchText(train.CurrentNotch)}</span></div>
                    <div class="info-row"><span>운전자</span><span class="v-value">${train.DriverName}</span></div>
                    <div style="display:flex; gap:10px; margin-top:15px;">
                        <button class="btn btn-danger" onclick="sendCmd('${id}', 'emergency')">비상제동</button>
                        <button class="btn btn-safe" onclick="sendCmd('${id}', 'reset')">해제</button>
                    </div>
                `;

                // 마커 업데이트
                let marker = document.querySelector(`.marker[data-id="${id}"]`);
                if(!marker) {
                    marker = document.createElement('div');
                    marker.className = 'marker';
                    marker.dataset.id = id;
                    map.appendChild(marker);
                }
                const px = ((train.PositionX - MAP_BOUNDS.min) / (MAP_BOUNDS.max - MAP_BOUNDS.min)) * 100;
                const pz = ((train.PositionZ - MAP_BOUNDS.min) / (MAP_BOUNDS.max - MAP_BOUNDS.min)) * 100;
                marker.style.left = px + "%"; marker.style.top = pz + "%";
                marker.style.background = isEmergency ? "var(--danger)" : "var(--accent)";
            }
        }

        function getNotchText(n) {
            if(n > 0) return "P" + n;
            if(n < 0) return (n === -5) ? "EB (비상)" : "B" + Math.abs(n);
            return "N (중립)";
        }

        function renderLogs(logs) {
            const box = document.getElementById('log-display');
            box.innerHTML = logs.map(l => `
                <div class="log-line">
                    <span class="log-time">[${l.time}]</span>
                    <span class="log-user">@${l.user}</span> ${l.msg}
                </div>
            `).join('');
        }

        async function setLimit(tid, val) {
            await fetch('/api/web-speedlimit', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ trainId: tid, speedLimit: parseInt(val), user: currentUser.id })
            });
        }

        async function sendCmd(tid, type) {
            await fetch(`/api/web-${type}`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ trainId: tid, user: currentUser.id })
            });
        }
    </script>
</body>
</html>
