<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로블록스 통합 관제 센터 & 모니터링 맵</title>
    <style>
        body {
            font-family: 'Malgun Gothic', sans-serif;
            background-color: #1a1a24;
            color: #fff;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: #4facfe;
            margin-bottom: 20px;
            text-shadow: 0 0 10px rgba(79, 172, 254, 0.3);
        }

        /* [신규] 실시간 모니터링 관제 지도 스타일 */
        .map-section {
            max-width: 1200px;
            width: 100%;
            background: #242536;
            border-radius: 12px;
            border: 1px solid #33344d;
            padding: 15px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            margin-bottom: 25px;
        }

        .map-title {
            font-size: 16px;
            font-weight: bold;
            color: #a0a5c2;
            margin-bottom: 10px;
            border-left: 4px solid #4facfe;
            padding-left: 8px;
        }

        .map-container {
            width: 100%;
            height: 350px;
            background: #151622;
            border-radius: 8px;
            border: 1px solid #2a2b3d;
            position: relative;
            overflow: hidden;
        }

        /* 지도 배경 격자선 효과 */
        .map-container::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 20px 20px;
        }

        /* 지도 위 열차 마커 스타일 */
        .train-marker {
            position: absolute;
            width: 14px;
            height: 14px;
            background: #00f2fe;
            border: 2px solid #fff;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: left 0.5s linear, top 0.5s linear;
            box-shadow: 0 0 8px #00f2fe;
            z-index: 10;
            cursor: pointer;
        }

        .train-marker.ems {
            background: #ff4d4d;
            box-shadow: 0 0 10px #ff4d4d;
            animation: marker-blink 0.8s infinite;
        }

        .train-marker-label {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            color: #fff;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 10px;
            white-space: nowrap;
            border: 1px solid #4facfe;
        }

        /* 기차 카드 그리드 레이아웃 */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
            max-width: 1200px;
            width: 100%;
        }

        .train-card {
            background: #242536;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            border: 1px solid #33344d;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .card-header {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 15px;
            border-bottom: 2px solid #3d3f5c;
            padding-bottom: 8px;
            color: #4facfe;
            display: flex;
            justify-content: space-between;
        }

        .train-id {
            font-size: 12px;
            color: #888;
            align-self: center;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 15px;
        }

        .info-value {
            font-weight: bold;
            color: #00f2fe;
        }

        .driver-zone {
            display: flex;
            align-items: center;
            gap: 15px;
            background: #1c1d2a;
            padding: 10px;
            border-radius: 8px;
            margin: 15px 0;
        }

        .avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 2px solid #4facfe;
            background: #151622;
        }

        .driver-name {
            font-weight: bold;
            font-size: 15px;
        }

        .control-zone {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .btn {
            flex: 1;
            padding: 12px;
            font-size: 14px;
            font-weight: bold;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.2s;
            color: white;
        }

        .btn-danger {
            background: #ff4d4d;
        }

        .btn-danger:hover {
            background: #ff3333;
        }

        .btn-safe {
            background: #2ecc71;
        }

        .btn-safe:hover {
            background: #27ae60;
        }

        .status-badge {
            padding: 3px 6px;
            border-radius: 4px;
            font-size: 13px;
            font-weight: bold;
        }

        .status-normal {
            background: #2ecc71;
            color: white;
        }

        .status-ems {
            background: #ff4d4d;
            color: white;
            animation: blink 1s infinite;
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.5;
            }
        }

        @keyframes marker-blink {

            0%,
            100% {
                transform: translate(-50%, -50%) scale(1);
            }

            50% {
                transform: translate(-50%, -50%) scale(1.3);
            }
        }

        .no-trains {
            text-align: center;
            color: #666;
            font-size: 18px;
            margin-top: 40px;
            width: 100%;
            grid-column: 1 / -1;
        }
    </style>
</head>

<body>
    <h1>INTEGRATED TRAIN CONTROL CENTER</h1>

    <!-- [신규] 실시간 지도 섹션 -->
    <div class="map-section">
        <div class="map-title">실시간 열차 위치 모니터링 맵 (Live Tracking)</div>
        <div class="map-container" id="live-map">
            <!-- 자바스크립트로 기차 점들이 실시간 생성됨 -->
        </div>
    </div>

    <!-- 기차 개별 제어 카드 판넬 -->
    <div class="grid-container" id="dashboard-grid">
        <div class="no-trains">운행 중인 열차가 없어 대시보드가 대기 중입니다.</div>
    </div>

    <script>
        // [★ 중요] 로블록스 월드(맵)의 크기에 맞춰 범위를 설정하세요.
        // 기차가 가장 멀리 갈 수 있는 최소/최대 X, Z 좌표를 적어주면 지도 크기에 맞춰 자동 비례 계산됩니다.
        const ROBLOX_MAP_BOUNDS = {
            minX: -3000,
            maxX: 3000,
            minZ: -3000,
            maxZ: 3000
        };

        async function updateDashboard() {
            try {
                const res = await fetch('/api/current-data');
                const trains = await res.json();

                const grid = document.getElementById('dashboard-grid');
                const map = document.getElementById('live-map');

                // 지도 내부 초기화 (배경 격자선 제외)
                map.innerHTML = '';

                if (Object.keys(trains).length === 0) {
                    grid.innerHTML = '<div class="no-trains">운행 중인 열차가 없어 대시보드가 대기 중입니다.</div>';
                    return;
                }

                let htmlContent = '';

                for (const id in trains) {
                    const train = trains[id];
                    const isEms = train.IsEmergency || train.remoteEmergencyActive;

                    // ============================================================
                    // [신규] 지도 위에 기차 위치 도트(점) 그리기 로직
                    // ============================================================
                    const rawX = train.PositionX || 0;
                    const rawZ = train.PositionZ || 0;

                    // 로블록스 좌표계를 웹 브라우저 % 비율 좌표로 변환
                    let pctX = ((rawX - ROBLOX_MAP_BOUNDS.minX) / (ROBLOX_MAP_BOUNDS.maxX - ROBLOX_MAP_BOUNDS.minX)) * 100;
                    let pctZ = ((rawZ - ROBLOX_MAP_BOUNDS.minZ) / (ROBLOX_MAP_BOUNDS.maxZ - ROBLOX_MAP_BOUNDS.minZ)) * 100;

                    // 지도를 벗어나지 않게 범위 제한 (0% ~ 100%)
                    pctX = Math.max(0, Math.min(100, pctX));
                    pctZ = Math.max(0, Math.min(100, pctZ));

                    // 지도용 점(마커) HTML 생성
                    const marker = document.createElement('div');
                    marker.className = `train-marker ${isEms ? 'ems' : ''}`;
                    marker.style.left = `${pctX}%`;
                    marker.style.top = `${pctZ}%`; // 로블록스의 Z는 2D 지도의 Y축(Top)에 매핑됩니다.

                    // 점 위에 띄울 툴팁 라벨
                    const label = document.createElement('div');
                    label.className = 'train-marker-label';
                    label.innerText = train.TrainName.split(' ')[0] || "열차"; // 이름이 길면 첫 단어만 표시

                    marker.appendChild(label);
                    map.appendChild(marker);

                    // ============================================================
                    // 기존 하단 기차 제어 정보 카드 매핑
                    // ============================================================
                    let notchText = "N";
                    if (train.CurrentNotch > 0) notchText = "P" + train.CurrentNotch;
                    else if (train.CurrentNotch < 0) notchText = "B" + Math.abs(train.CurrentNotch);

                    let revText = "중립 (N)";
                    if (train.CurrentReverser === 1) revText = "전진 (F)";
                    else if (train.CurrentReverser === -1) revText = "후진 (B)";

                    const badgeClass = isEms ? "status-badge status-ems" : "status-badge status-normal";
                    const badgeText = isEms ? "비상 정지" : "정상 운행";

                    const avatarUrl = train.DriverId > 0
                        ? `https://www.roblox.com/headshot-thumbnail/image?userId=${train.DriverId}&width=150&height=150&format=png`
                        : `https://www.roblox.com/headshot-thumbnail/image?userId=0&width=150&height=150&format=png`;

                    htmlContent += `
                    <div class="train-card">
                        <div>
                            <div class="card-header">
                                <span>${train.TrainName}</span>
                                <span class="train-id">ID: ${id}</span>
                            </div>
                            <div class="info-row"><span>현재 속도</span><span class="info-value">${train.CurrentSpeed} km/h</span></div>
                            <div class="info-row"><span>제어 단수</span><span class="info-value">${notchText}</span></div>
                            <div class="info-row"><span>역전기 방향</span><span class="info-value">${revText}</span></div>
                            <div class="info-row"><span>현재 위치 (X, Z)</span><span class="info-value" style="color:#a0a5c2;">${rawX}, ${rawZ}</span></div>
                            <div class="info-row">
                                <span>안전 상태</span>
                                <span class="${badgeClass}">${badgeText}</span>
                            </div>
                        </div>

                        <div>
                            <div class="driver-zone">
                                <img class="avatar" src="${avatarUrl}" alt="Driver">
                                <div class="driver-name">${train.DriverName || '승무원 없음'}</div>
                            </div>
                            <div class="control-zone">
                                <button class="btn btn-danger" onclick="triggerEmergency('${id}')">비상정지</button>
                                <button class="btn btn-safe" onclick="resetEmergency('${id}')">해제</button>
                            </div>
                        </div>
                    </div>
                    `;
                }

                grid.innerHTML = htmlContent;

            } catch (e) {
                console.error("대시보드 동기화 실패", e);
            }
        }

        async function triggerEmergency(trainId) {
            await fetch('/api/web-emergency', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ trainId: trainId })
            });
            updateDashboard();
        }

        async function resetEmergency(trainId) {
            await fetch('/api/web-reset', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ trainId: trainId })
            });
            updateDashboard();
        }

        setInterval(updateDashboard, 1000);
        updateDashboard();
    </script>
</body>

</html>
