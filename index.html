<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로블록스 통합 관제 센터 & 모니터링 맵</title>
    <style>
        body {
            font-family: 'Malgun Gothic', sans-serif;
            background-color: #1a1a24;
            color: #fff;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: #4facfe;
            margin-bottom: 20px;
            text-shadow: 0 0 10px rgba(79, 172, 254, 0.3);
        }

        .map-section {
            max-width: 1200px;
            width: 100%;
            background: #242536;
            border-radius: 12px;
            border: 1px solid #33344d;
            padding: 15px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            margin-bottom: 25px;
            box-sizing: border-box;
        }

        .map-title {
            font-size: 16px;
            font-weight: bold;
            color: #a0a5c2;
            margin-bottom: 10px;
            border-left: 4px solid #4facfe;
            padding-left: 8px;
        }

        .map-container {
            width: 100%;
            height: 450px;
            background: #151622;
            border-radius: 8px;
            border: 1px solid #2a2b3d;
            position: relative;
            overflow: hidden;
        }

        .map-container::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 20px 20px;
        }

        .train-marker {
            position: absolute;
            width: 14px;
            height: 14px;
            background: #00f2fe;
            border: 2px solid #fff;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: left 0.1s linear, top 0.1s linear;
            box-shadow: 0 0 8px #00f2fe;
            z-index: 10;
        }

        .train-marker.ems {
            background: #ff4d4d;
            box-shadow: 0 0 10px #ff4d4d;
            animation: marker-blink 0.8s infinite;
        }

        .train-marker-label {
            position: absolute;
            top: -22px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.85);
            color: #fff;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 10px;
            white-space: nowrap;
            border: 1px solid #4facfe;
            pointer-events: none;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 20px;
            max-width: 1200px;
            width: 100%;
        }

        .train-card {
            background: #242536;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            border: 1px solid #33344d;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .card-header {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 15px;
            border-bottom: 2px solid #3d3f5c;
            padding-bottom: 8px;
            color: #4facfe;
            display: flex;
            justify-content: space-between;
        }

        .train-id {
            font-size: 12px;
            color: #888;
            align-self: center;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 15px;
        }

        .info-value {
            font-weight: bold;
            color: #00f2fe;
        }

        .limit-input-zone {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #1c1d2a;
            padding: 8px 12px;
            border-radius: 6px;
            margin-bottom: 10px;
        }

        .limit-input {
            width: 70px;
            background: #242536;
            border: 1px solid #4facfe;
            color: #fff;
            padding: 4px;
            border-radius: 4px;
            text-align: center;
            font-weight: bold;
        }

        .btn-sm {
            padding: 4px 8px;
            background: #4facfe;
            border: none;
            color: white;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }

        .driver-zone {
            display: flex;
            align-items: center;
            gap: 15px;
            background: #1c1d2a;
            padding: 10px;
            border-radius: 8px;
            margin: 12px 0;
        }

        .avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 2px solid #4facfe;
            background: #151622;
        }

        .driver-name {
            font-weight: bold;
            font-size: 15px;
        }

        .control-zone {
            display: flex;
            gap: 10px;
            margin-top: 5px;
        }

        .btn {
            flex: 1;
            padding: 12px;
            font-size: 14px;
            font-weight: bold;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.2s;
            color: white;
        }

        .btn-danger { background: #ff4d4d; }
        .btn-danger:hover { background: #ff3333; }
        .btn-safe { background: #2ecc71; }
        .btn-safe:hover { background: #27ae60; }

        .status-badge {
            padding: 3px 6px;
            border-radius: 4px;
            font-size: 13px;
            font-weight: bold;
        }

        .status-normal { background: #2ecc71; color: white; }
        .status-ems { background: #ff4d4d; color: white; animation: blink 1s infinite; }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        @keyframes marker-blink { 0%, 100% { transform: translate(-50%, -50%) scale(1); } 50% { transform: translate(-50%, -50%) scale(1.3); } }

        .no-trains {
            text-align: center;
            color: #666;
            font-size: 18px;
            margin-top: 40px;
            width: 100%;
            grid-column: 1 / -1;
        }
    </style>
</head>

<body>
    <h1>INTEGRATED TRAIN CONTROL CENTER</h1>

    <div class="map-section">
        <div class="map-title">실시간 열차 위치 모니터링 맵 (Live Tracking)</div>
        <div class="map-container" id="live-map"></div>
    </div>

    <div class="grid-container" id="dashboard-grid">
        <div class="no-trains" id="no-trains-msg">운행 중인 열차가 없어 대시보드가 대기 중입니다.</div>
    </div>

    <script>
        // 본인의 로블록스 인게임 맵 실제 최소/최대 좌표계 세팅
        const ROBLOX_MAP_BOUNDS = {
            minX: -3000,
            maxX: 3000,
            minZ: -3000,
            maxZ: 3000
        };

        async function updateDashboard() {
            try {
                const res = await fetch('/api/current-data');
                const trains = await res.json();

                const grid = document.getElementById('dashboard-grid');
                const map = document.getElementById('live-map');
                const noTrainsMsg = document.getElementById('no-trains-msg');

                const currentIds = Object.keys(trains);

                if (currentIds.length === 0) {
                    grid.innerHTML = '<div class="no-trains" id="no-trains-msg">운행 중인 열차가 없어 대시보드가 대기 중입니다.</div>';
                    map.innerHTML = '';
                    return;
                }

                if (noTrainsMsg) noTrainsMsg.remove();

                // 1. 제거된 열차 청소 (DOM 엘리먼트 삭제)
                document.querySelectorAll('.train-card').forEach(card => {
                    if (!trains[card.dataset.id]) card.remove();
                });
                document.querySelectorAll('.train-marker').forEach(marker => {
                    if (!trains[marker.dataset.id]) marker.remove();
                });

                // 2. 데이터 업데이트 및 신규 열차 렌더링
                for (const id in trains) {
                    const train = trains[id];
                    const isEms = train.IsEmergency || train.remoteEmergencyActive;[cite: 6]

                    // --- 지도 레이어 마커 제어 ---
                    let marker = document.querySelector(`.train-marker[data-id="${id}"]`);
                    if (!marker) {
                        marker = document.createElement('div');
                        marker.className = 'train-marker';
                        marker.dataset.id = id;
                        const label = document.createElement('div');
                        label.className = 'train-marker-label';
                        marker.appendChild(label);
                        map.appendChild(marker);
                    }
                    
                    if (isEms) marker.classList.add('ems');
                    else marker.classList.remove('ems');

                    // 좌표 계산식 버그 수정 (격자 정 중앙 맞춤)
                    let pctX = ((train.PositionX - ROBLOX_MAP_BOUNDS.minX) / (ROBLOX_MAP_BOUNDS.maxX - ROBLOX_MAP_BOUNDS.minX)) * 100;[cite: 6]
                    let pctZ = ((train.PositionZ - ROBLOX_MAP_BOUNDS.minZ) / (ROBLOX_MAP_BOUNDS.maxZ - ROBLOX_MAP_BOUNDS.minZ)) * 100;[cite: 6]
                    marker.style.left = `${Math.max(0, Math.min(100, pctX))}%`;[cite: 6]
                    marker.style.top = `${Math.max(0, Math.min(100, pctZ))}%`;[cite: 6]
                    marker.querySelector('.train-marker-label').innerText = `${train.TrainName.split(' ')[0]} (${train.CurrentSpeed}km/h)`;

                    // --- 대시보드 카드 레이어 제어 ---
                    let card = document.querySelector(`.train-card[data-id="${id}"]`);
                    if (!card) {
                        card = document.createElement('div');
                        card.className = 'train-card';
                        card.dataset.id = id;
                        card.innerHTML = `
                            <div>
                                <div class="card-header">
                                    <span class="v-name"></span>
                                    <span class="train-id">ID: ${id}</span>
                                </div>
                                <div class="info-row"><span>현재 속도</span><span class="info-value v-speed">0 km/h</span></div>
                                <div class="info-row"><span>제어 단수</span><span class="info-value v-notch">N</span></div>
                                <div class="info-row"><span>역전기 방향</span><span class="info-value v-rev">중립 (N)</span></div>
                                <div class="info-row"><span>현재 위치 (X, Z)</span><span class="info-value v-pos" style="color:#a0a5c2;">0, 0</span></div>
                                <div class="limit-input-zone">
                                    <span>ATC 제한속도 설정</span>
                                    <div>
                                        <input type="number" class="limit-input" value="${train.SpeedLimit || 80}">
                                        <button class="btn-sm" onclick="setSpeedLimit('${id}', this)">설정</button>
                                    </div>
                                </div>
                                <div class="info-row">
                                    <span>안전 상태</span>
                                    <span class="status-badge v-badge">정상</span>
                                </div>
                            </div>
                            <div>
                                <div class="driver-zone">
                                    <img class="avatar v-avatar" src="" alt="Driver">
                                    <div class="driver-name v-driver">대기 중</div>
                                </div>
                                <div class="control-zone">
                                    <button class="btn btn-danger" onclick="triggerEmergency('${id}')">비상정지</button>
                                    <button class="btn btn-safe" onclick="resetEmergency('${id}')">해제</button>
                                </div>
                            </div>
                        `;
                        grid.appendChild(card);
                    }

                    // 버버벅거림 없는 실시간 텍스트 데이터 교체
                    card.querySelector('.v-name').innerText = train.TrainName;
                    card.querySelector('.v-speed').innerText = `${train.CurrentSpeed} km/h (제한: ${train.SpeedLimit || 80} km/h)`;
                    
                    let notchText = "N";
                    if (train.CurrentNotch > 0) notchText = "P" + train.CurrentNotch;
                    else if (train.CurrentNotch < 0) notchText = (train.CurrentNotch === -5) ? "EB (비상)" : "B" + Math.abs(train.CurrentNotch);
                    card.querySelector('.v-notch').innerText = notchText;

                    let revText = "중립 (N)";
                    if (train.CurrentReverser === 1) revText = "전진 (F)";
                    else if (train.CurrentReverser === -1) revText = "후진 (B)";
                    card.querySelector('.v-rev').innerText = revText;
                    card.querySelector('.v-pos').innerText = `${train.PositionX}, ${train.PositionZ}`;

                    const badge = card.querySelector('.v-badge');
                    if (train.remoteEmergencyActive) {
                        badge.className = "status-badge status-ems";
                        badge.innerText = "원격 정지 발령";
                    } else if (train.IsEmergency) {
                        badge.className = "status-badge status-ems";
                        badge.innerText = "비상 정지 체결";
                    } else {
                        badge.className = "status-badge status-normal";
                        badge.innerText = "정상 운행";
                    }

                    // 최신화된 안전한 로블록스 썸네일 경로 매핑 버그 수정
                    const targetUserId = train.DriverId > 0 ? train.DriverId : 1; 
                    card.querySelector('.v-avatar').src = `https://thumbnails.roblox.com/v1/users/avatar-headshot?userIds=${targetUserId}&size=150x150&format=Png&isCircular=true`;
                    card.querySelector('.v-driver').innerText = train.DriverName || '승무원 없음';
                }
            } catch (e) {
                console.error("대시보드 동기화 실패", e);
            }
        }

        async function setSpeedLimit(trainId, buttonObj) {
            const inputVal = parseInt(buttonObj.previousElementSibling.value);
            if(isNaN(inputVal) || inputVal < 0) return alert("올바른 속도를 입력하세요.");
            
            await fetch('/api/web-speedlimit', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ trainId: trainId, speedLimit: inputVal })
            });
        }

        async function triggerEmergency(trainId) {
            await fetch('/api/web-emergency', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ trainId: trainId })[cite: 6]
            });
        }

        async function resetEmergency(trainId) {
            await fetch('/api/web-reset', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ trainId: trainId })[cite: 6]
            });
        }

        // 0.1초(100ms) 단위 초고속 갱신으로 버버벅거림 제거
        setInterval(updateDashboard, 100);
        updateDashboard();
    </script>
</body>

</html>
