<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>로블록스 차세대 통합 관제 시스템</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Noto+Sans+KR:wght@300;500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- 🔒 DB의 bcryptjs 암호화 비밀번호 검증용 라이브러리 추가 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bcryptjs/2.4.3/bcrypt.min.js"></script>

    <style>
        :root {
            --bg-color: #05060f;
            --panel-bg: rgba(18, 20, 36, 0.7);
            --panel-border: rgba(88, 166, 255, 0.15);
            --primary: #58a6ff;
            --accent: #00f2fe;
            --danger: #ff4d6d;
            --danger-glow: rgba(255, 77, 109, 0.4);
            --success: #2ecc71;
            --text-main: #f1f2f6;
            --text-muted: #8b949e;
        }

        * {
            box-sizing: border-box;
            font-family: 'Noto Sans KR', sans-serif;
        }

        html, body {
            height: 100%;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
            background-image:
                radial-gradient(circle at 15% 50%, rgba(88, 166, 255, 0.04), transparent 30%),
                radial-gradient(circle at 85% 30%, rgba(0, 242, 254, 0.04), transparent 30%);
        }

        /* 1. 로그인 인증 레이어 */
        #auth-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(5, 6, 15, 0.95);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(12px);
            padding: 16px;
        }

        .auth-card {
            background: linear-gradient(180deg, rgba(25, 27, 48, 0.9), rgba(18, 20, 36, 0.9));
            border: 1px solid var(--panel-border);
            padding: 40px;
            border-radius: 16px;
            width: 400px;
            max-width: 100%;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        .auth-card h2 {
            font-family: 'Orbitron', sans-serif;
            color: var(--primary);
            margin-bottom: 30px;
            letter-spacing: 2px;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 6px;
        }

        .form-control {
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px;
            border-radius: 8px;
            color: white;
            font-size: 15px;
            transition: 0.3s;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 10px rgba(88, 166, 255, 0.3);
        }

        /* 2. 좌측 사이드바 */
        .sidebar {
            width: 280px;
            flex-shrink: 0;
            background: rgba(13, 17, 23, 0.95);
            border-right: 1px solid var(--panel-border);
            display: flex;
            flex-direction: column;
            padding: 20px;
            z-index: 100;
        }

        .sidebar-brand {
            font-family: 'Orbitron', sans-serif;
            font-size: 20px;
            font-weight: 900;
            color: var(--primary);
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .user-profile-box {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            padding: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 25px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .user-profile-box img {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: #151622;
            border: 2px solid var(--primary);
            object-fit: cover;
        }

        .user-info .u-name {
            font-weight: bold;
            font-size: 14px;
        }

        .user-info .u-role {
            font-size: 11px;
            color: var(--accent);
        }

        .menu-item {
            padding: 12px 16px;
            border-radius: 8px;
            color: var(--text-muted);
            cursor: pointer;
            margin-bottom: 8px;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 500;
        }

        .menu-item:hover,
        .menu-item.active {
            background: rgba(88, 166, 255, 0.1);
            color: var(--primary);
            border-left: 4px solid var(--primary);
        }

        .btn {
            padding: 12px;
            font-size: 13px;
            font-weight: 700;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .btn-primary {
            background: var(--primary);
            color: #000;
        }

        .btn-primary:hover {
            background: #6cb3ff;
        }

        .btn-danger {
            background: var(--danger);
            box-shadow: 0 4px 12px rgba(255, 77, 109, 0.2);
        }

        .btn-danger:hover {
            background: #e0435f;
        }

        .btn-safe {
            background: var(--success);
        }

        .btn-safe:hover {
            background: #27ae60;
        }

        /* 3. 우측 메인 콘텐츠 레이아웃 */
        .main-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            min-width: 0;
        }

        .top-navbar {
            height: 70px;
            flex-shrink: 0;
            background: rgba(13, 17, 23, 0.6);
            border-bottom: 1px solid var(--panel-border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
            backdrop-filter: blur(10px);
            gap: 12px;
        }

        .top-navbar h1 {
            font-size: 18px;
            margin: 0;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .navbar-left {
            display: flex;
            align-items: center;
            gap: 14px;
            min-width: 0;
        }

        /* 모바일 전용 햄버거 버튼: 데스크탑에서는 숨김 */
        #hamburger-btn {
            display: none;
            background: transparent;
            border: 1px solid var(--panel-border);
            color: var(--text-main);
            font-size: 18px;
            width: 40px;
            height: 40px;
            border-radius: 8px;
            cursor: pointer;
            flex-shrink: 0;
            align-items: center;
            justify-content: center;
        }

        #sidebar-backdrop {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: 400;
        }

        .content-body {
            flex: 1;
            padding: 25px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 25px;
            -webkit-overflow-scrolling: touch;
        }

        .view-section {
            display: none;
            flex-direction: column;
            gap: 25px;
        }

        .view-section.active {
            display: flex;
        }

        /* 4. 관제 맵 레이아웃 */
        .map-section {
            background: var(--panel-bg);
            border-radius: 16px;
            border: 1px solid var(--panel-border);
            padding: 20px;
        }

        .section-title {
            font-size: 15px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .map-container {
            width: 100%;
            height: 420px;
            background: #010409;
            background-image: url('');
            background-size: cover;
            background-position: center;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            position: relative;
            overflow: hidden;
        }

        .map-container::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: linear-gradient(rgba(88, 166, 255, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(88, 166, 255, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            pointer-events: none;
            z-index: 1;
        }

        .train-marker {
            position: absolute;
            width: 16px;
            height: 16px;
            background: var(--accent);
            border: 3px solid #fff;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: left 0.2s ease, top 0.2s ease;
            box-shadow: 0 0 12px var(--accent);
            z-index: 10;
        }

        .train-marker.ems {
            background: var(--danger);
            box-shadow: 0 0 15px var(--danger);
            animation: marker-blink 0.6s infinite alternate;
        }

        .train-marker-label {
            position: absolute;
            top: -26px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.9);
            color: #fff;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: bold;
            white-space: nowrap;
            border: 1px solid var(--primary);
            pointer-events: none;
        }

        /* 5. 열차 현황 카드 대시보드 */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 25px;
        }

        .train-card {
            background: linear-gradient(180deg, rgba(25, 27, 48, 0.9), rgba(18, 20, 36, 0.9));
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 24px;
            backdrop-filter: blur(15px);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: 0.3s;
        }

        .train-card:hover {
            border-color: var(--primary);
            box-shadow: 0 0 20px rgba(88, 166, 255, 0.15);
            transform: translateY(-3px);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            padding-bottom: 12px;
            margin-bottom: 16px;
        }

        .v-name {
            font-size: 17px;
            font-weight: 700;
            color: #fff;
        }

        .train-id {
            font-size: 11px;
            color: var(--text-muted);
            font-family: 'Orbitron', sans-serif;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            font-size: 14px;
            gap: 10px;
        }

        .info-label {
            color: var(--text-muted);
            flex-shrink: 0;
        }

        .info-value {
            font-weight: 700;
            color: var(--accent);
            text-align: right;
        }

        .limit-input-zone {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(0, 0, 0, 0.2);
            padding: 10px 14px;
            border-radius: 8px;
            margin: 15px 0;
            border: 1px solid rgba(255, 255, 255, 0.03);
            flex-wrap: wrap;
            gap: 8px;
        }

        .limit-input {
            width: 65px;
            background: #010409;
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #fff;
            padding: 6px;
            border-radius: 6px;
            text-align: center;
            font-weight: bold;
        }

        .limit-input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .driver-zone {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(255, 255, 255, 0.02);
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 16px;
            border: 1px solid rgba(255, 255, 255, 0.04);
        }

        .avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: 2px solid var(--primary);
            background: #000;
            object-fit: cover;
        }

        .driver-meta {
            display: flex;
            flex-direction: column;
        }

        .driver-name {
            font-weight: 700;
            font-size: 14px;
        }

        .control-zone {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .control-zone .btn {
            flex: 1;
            min-width: 90px;
            padding: 10px 4px;
            font-size: 11px;
        }

        .status-badge {
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 700;
        }

        .status-normal {
            background: rgba(46, 204, 113, 0.15);
            color: var(--success);
            border: 1px solid var(--success);
        }

        .status-ems {
            background: rgba(255, 77, 109, 0.15);
            color: var(--danger);
            border: 1px solid var(--danger);
            animation: card-blink 1s infinite alternate;
        }

        /* 6. 계정 관리 및 로그 스타일 */
        .card-table-wrap {
            background: var(--panel-bg);
            border-radius: 16px;
            border: 1px solid var(--panel-border);
            padding: 24px;
        }

        .admin-flex {
            display: flex;
            gap: 30px;
            align-items: flex-start;
            flex-wrap: wrap;
        }

        .admin-form {
            width: 320px;
            max-width: 100%;
            background: rgba(0, 0, 0, 0.2);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .table-scroll-wrap {
            width: 100%;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        .custom-table {
            width: 100%;
            min-width: 560px;
            border-collapse: collapse;
            text-align: left;
            margin-top: 10px;
        }

        .custom-table th,
        .custom-table td {
            padding: 14px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }

        .custom-table th {
            color: var(--text-muted);
            font-weight: 500;
            font-size: 13px;
        }

        .log-box {
            background: #010409;
            border-radius: 12px;
            padding: 15px;
            height: 500px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            line-height: 1.6;
            border: 1px solid rgba(255, 255, 255, 0.05);
            -webkit-overflow-scrolling: touch;
        }

        .log-line {
            margin-bottom: 8px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.02);
            padding-bottom: 4px;
            word-break: break-word;
        }

        .log-time {
            color: var(--primary);
            margin-right: 10px;
        }

        .log-user {
            color: var(--accent);
            font-weight: bold;
            margin-right: 6px;
        }

        .no-trains {
            text-align: center;
            color: var(--text-muted);
            font-size: 15px;
            padding: 60px 0;
            width: 100%;
            grid-column: 1 / -1;
        }

        @keyframes card-blink {
            0% {
                box-shadow: 0 0 4px var(--danger-glow);
            }

            100% {
                box-shadow: 0 0 16px var(--danger-glow);
            }
        }

        @keyframes marker-blink {
            0% {
                transform: translate(-50%, -50%) scale(0.9);
            }

            100% {
                transform: translate(-50%, -50%) scale(1.2);
            }
        }

        /* ==========================================================
           📱 모바일 반응형 (900px 이하): 사이드바를 오프캔버스 메뉴로 전환
           ========================================================== */
        @media (max-width: 900px) {
            body {
                overflow: hidden;
            }

            #hamburger-btn {
                display: flex;
            }

            .sidebar {
                position: fixed;
                top: 0;
                left: -300px;
                height: 100%;
                width: 260px;
                max-width: 80vw;
                transition: left 0.25s ease;
                box-shadow: 4px 0 20px rgba(0, 0, 0, 0.5);
            }

            .sidebar.open {
                left: 0;
            }

            #sidebar-backdrop.open {
                display: block;
            }

            .main-wrapper {
                width: 100%;
            }

            .top-navbar {
                padding: 0 16px;
            }

            .top-navbar h1 {
                font-size: 15px;
            }

            .top-navbar span {
                display: none;
            }

            .content-body {
                padding: 14px;
                gap: 16px;
            }

            .map-section {
                padding: 12px;
            }

            .map-container {
                height: 260px;
            }

            .grid-container {
                grid-template-columns: 1fr;
                gap: 16px;
            }

            .train-card {
                padding: 16px;
            }

            .admin-flex {
                flex-direction: column;
                gap: 16px;
            }

            .admin-form {
                width: 100%;
            }

            .card-table-wrap {
                padding: 14px;
            }

            .log-box {
                height: 360px;
                font-size: 12px;
            }

            .control-zone .btn {
                min-width: 80px;
                font-size: 10px;
                padding: 10px 2px;
            }

            .limit-input-zone {
                flex-direction: row;
                justify-content: space-between;
            }
        }

        @media (max-width: 420px) {
            .auth-card {
                padding: 24px 18px;
            }

            .info-row {
                font-size: 13px;
            }

            .control-zone {
                flex-direction: column;
            }

            .control-zone .btn {
                width: 100%;
            }
        }
    </style>
</head>

<body>
    <div id="auth-overlay">
        <div class="auth-card">
            <h2>TCMS LOGIN</h2>
            <div class="form-group">
                <label><i class="fa-solid fa-user"></i> 관리자 아이디</label>
                <input type="text" id="login-id" class="form-control" placeholder="ID를 입력하세요">
            </div>
            <div class="form-group">
                <label><i class="fa-solid fa-lock"></i> 비밀번호</label>
                <input type="password" id="login-pw" class="form-control" placeholder="Password를 입력하세요"
                    onkeyup="if(event.key==='Enter') handleLogin()">
            </div>
            <button class="btn btn-primary" style="width:100%; margin-top:10px;" onclick="handleLogin()">시스템 접속</button>
        </div>
    </div>

    <div id="sidebar-backdrop" onclick="closeSidebar()"></div>

    <div class="sidebar" id="app-sidebar">
        <div class="sidebar-brand">
            <i class="fa-solid fa-circle-nodes"></i> NEXT-TCMS
        </div>

        <div class="user-profile-box">
            <img id="my-avatar" src="https://upload.wikimedia.org/wikipedia/commons/a/ac/Default_pfp.jpg" alt="Avatar">
            <div class="user-info">
                <div class="u-name" id="session-username">대기 중</div>
                <div class="u-role" id="session-role">-</div>
            </div>
        </div>

        <div class="menu-item active" onclick="switchView('dashboard', this)"><i class="fa-solid fa-chart-line"></i> 실시간
            통합 관제</div>
        <div class="menu-item" id="menu-accounts" onclick="switchView('accounts', this)"><i
                class="fa-solid fa-users-gear"></i> 계정 및 권한 관리</div>
        <div class="menu-item" onclick="switchView('logs', this)"><i class="fa-solid fa-file-shield"></i> 시스템 감사 로그
        </div>

        <button class="btn btn-danger" style="margin-top: auto; padding: 12px; width: 100%;" onclick="handleLogout()">
            <i class="fa-solid fa-right-from-bracket"></i> 로그아웃
        </button>
    </div>

    <div class="main-wrapper">
        <div class="top-navbar">
            <div class="navbar-left">
                <button id="hamburger-btn" onclick="toggleSidebar()" aria-label="메뉴 열기">
                    <i class="fa-solid fa-bars"></i>
                </button>
                <h1 id="nav-title">실시간 기차 통합 대시보드</h1>
            </div>
            <div><span style="font-size:13px; color:var(--text-muted); white-space:nowrap;"><i class="fa-solid fa-clock"></i> SYSTEM
                    LIVE</span></div>
        </div>

        <div class="content-body">
            <div id="view-dashboard" class="view-section active">
                <div class="map-section">
                    <div class="section-title"><i class="fa-solid fa-map-location-dot"></i> Live Tracking Display Map
                    </div>
                    <!-- 🗺️ 선로 레이아웃 SVG 및 마커 레이어가 겹치도록 맵 컨테이너 내부 구조 최적화 -->
                    <div class="map-container" id="live-map">
                        <!-- 선로 도면 레이어 (z-index: 1) -->
                        <svg id="track-svg"
                            style="width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 1; pointer-events: none;"></svg>
                        <!-- 실시간 열차 마커 레이어 (z-index: 2) -->
                        <div id="train-markers-layer"
                            style="position: absolute; width: 100%; height: 100%; top: 0; left: 0; z-index: 2; pointer-events: none;">
                        </div>
                    </div>
                </div>
                <div class="grid-container" id="dashboard-grid">
                    <div class="no-trains" id="no-trains-msg">네트워크 연결 대기 중이거나 운행 중인 열차가 없습니다.</div>
                </div>
            </div>

            <div id="view-accounts" class="view-section">
                <div class="card-table-wrap">
                    <div class="section-title" id="form-main-title"><i class="fa-solid fa-user-plus"></i> 신규 하위 관제 계정 발급
                        시스템</div>
                    <div class="admin-flex">
                        <div class="admin-form" id="account-form">
                            <h3 id="form-action-title"
                                style="margin-top:0; font-size:14px; color:var(--primary); margin-bottom:15px;">계정 생성
                            </h3>
                            <div class="form-group">
                                <label>관제원 ID</label>
                                <input type="text" id="new-user-id" class="form-control" placeholder="아이디 지정">
                            </div>
                            <div class="form-group">
                                <label>비밀번호</label>
                                <input type="password" id="new-user-pw" class="form-control" placeholder="비밀번호 지정">
                            </div>
                            <div class="form-group">
                                <label>연동할 로블록스 UserID</label>
                                <input type="number" id="new-user-rbx" class="form-control" value="1">
                            </div>
                            <div class="form-group">
                                <label>권한 등급 설정</label>
                                <select id="new-user-role" class="form-control"
                                    style="background:#000; color:#fff; cursor: pointer;">
                                    <option value="일반 관제원">일반 관제원</option>
                                    <option value="최고 관리자">최고 관리자</option>
                                </select>
                            </div>
                            <div style="display:flex; gap:10px;">
                                <button id="btn-submit" class="btn btn-primary" style="flex:1; margin-top: 10px;"
                                    onclick="submitAccountForm()">계정 생성 및 발급</button>
                                <button id="btn-cancel" class="btn btn-danger"
                                    style="flex:1; margin-top: 10px; display:none;"
                                    onclick="cancelEditMode()">취소</button>
                            </div>
                        </div>
                        <div style="flex: 1; min-width: 0; width: 100%;">
                            <div class="table-scroll-wrap">
                                <table class="custom-table">
                                    <thead>
                                        <tr>
                                            <th>아바타</th>
                                            <th>관제원 계정 ID</th>
                                            <th>연동 로블록스 ID</th>
                                            <th>권한 레벨</th>
                                            <th>상태</th>
                                            <th>액션</th>
                                        </tr>
                                    </thead>
                                    <tbody id="account-table-body"></tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div id="view-logs" class="view-section">
                <div class="card-table-wrap">
                    <div class="section-title"><i class="fa-solid fa-terminal"></i> 실시간 관제 통제 및 명령어 감사 로그</div>
                    <div class="log-box" id="log-display-container"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const MASTER_ADMIN_ID = "lsrhjru";
        const FALLBACK_AVATAR = "https://upload.wikimedia.org/wikipedia/commons/a/ac/Default_pfp.jpg";

        // 🌐 선로 레이아웃에 맞게 백엔드 API에서 로드될 맵의 경계(Bounds) 정보 (기본값 설정)
        let ROBLOX_MAP_BOUNDS = { minX: -3000, maxX: 3000, minZ: -3000, maxZ: 3000 };

        let accountDB = [];
        let currentUserSession = null;
        let lastRenderedLogCount = 0;
        let isEditMode = false;
        let editingTargetId = null;

        const robloxCache = {};
        const robloxPromises = {};

        // 📱 모바일 오프캔버스 사이드바 토글
        function toggleSidebar() {
            const sidebar = document.getElementById('app-sidebar');
            const backdrop = document.getElementById('sidebar-backdrop');
            const isOpen = sidebar.classList.toggle('open');
            backdrop.classList.toggle('open', isOpen);
        }

        function closeSidebar() {
            document.getElementById('app-sidebar').classList.remove('open');
            document.getElementById('sidebar-backdrop').classList.remove('open');
        }

        function hasAdminPrivilege(user) {
            if (!user) return false;
            return user.id === MASTER_ADMIN_ID || user.role === "최고 관리자";
        }

        async function getRobloxProfile(rbxId) {
            const id = parseInt(rbxId) || 1;
            if (robloxCache[id]) return robloxCache[id];
            if (robloxPromises[id]) return robloxPromises[id];

            robloxPromises[id] = (async () => {
                try {
                    const res = await fetch(`/api/roblox/user/${id}?t=${Date.now()}`, { cache: 'no-store' });
                    if (!res.ok) throw new Error(`HTTP error! status: ${res.status}`);
                    const data = await res.json();
                    robloxCache[id] = data;
                    return data;
                } catch (e) {
                    console.error(`로블록스 정보 획득 실패 (ID: ${id})`, e);
                    const fallback = {
                        username: `ID: ${id}`,
                        avatarUrl: FALLBACK_AVATAR
                    };
                    robloxCache[id] = fallback;
                    return fallback;
                } finally {
                    delete robloxPromises[id];
                }
            })();

            return robloxPromises[id];
        }

        window.onload = async () => {
            await fetchTrackLayout(); // 🗺️ 백엔드로부터 dynamic 선로 레이아웃 및 Bounds 동기화
            await fetchAccounts();
        };

        // 🗺️ 백엔드에서 선로 레이아웃 데이터를 가져와 그리고, Bounds 범위를 갱신하는 함수
        async function fetchTrackLayout() {
            try {
                const res = await fetch(`/api/track-layout?t=${Date.now()}`, { cache: 'no-store' });
                if (res.ok) {
                    const data = await res.json();
                    if (data) {
                        if (data.bounds) {
                            ROBLOX_MAP_BOUNDS = data.bounds;
                            console.log("▶ [지도 동기화] 선로 레이아웃의 실시간 Bounds를 성공적으로 갱신했습니다.", ROBLOX_MAP_BOUNDS);
                        }
                        if (data.segments && data.segments.length > 0) {
                            drawTracks(data.segments);
                        }
                        // 💡 여기서부터 새로 추가된 역 데이터 그리기 로직입니다
                        if (data.stations && data.stations.length > 0) {
                            drawStations(data.stations);
                        }
                    }
                }
            } catch (e) {
                console.error("선로 레이아웃을 가져오지 못해 기본 좌표 범위(-3000 ~ 3000)를 사용합니다.", e);
            }
        }

        // 🗺️ 수신한 3D 세그먼트 좌표를 웹 화면 비율(%)에 매핑하여 SVG로 선로를 그립니다.
        function drawTracks(segments) {
            const svg = document.getElementById('track-svg');
            if (!svg) return;
            svg.innerHTML = ""; // 이전 선로 데이터 삭제

            segments.forEach(seg => {
                // 실제 3D 좌표 (X, Z) -> 관제 모니터 (X, Y) 백분율로 환산
                const x1Pct = ((seg.x1 - ROBLOX_MAP_BOUNDS.minX) / (ROBLOX_MAP_BOUNDS.maxX - ROBLOX_MAP_BOUNDS.minX)) * 100;
                const z1Pct = ((seg.z1 - ROBLOX_MAP_BOUNDS.minZ) / (ROBLOX_MAP_BOUNDS.maxZ - ROBLOX_MAP_BOUNDS.minZ)) * 100;
                const x2Pct = ((seg.x2 - ROBLOX_MAP_BOUNDS.minX) / (ROBLOX_MAP_BOUNDS.maxX - ROBLOX_MAP_BOUNDS.minX)) * 100;
                const z2Pct = ((seg.z2 - ROBLOX_MAP_BOUNDS.minZ) / (ROBLOX_MAP_BOUNDS.maxZ - ROBLOX_MAP_BOUNDS.minZ)) * 100;

                const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
                line.setAttribute("x1", `${x1Pct}%`);
                line.setAttribute("y1", `${z1Pct}%`);
                line.setAttribute("x2", `${x2Pct}%`);
                line.setAttribute("y2", `${z2Pct}%`);

                // 궤도 느낌을 강조하기 위한 스타일 속성 적용
                line.setAttribute("stroke", "rgba(88, 166, 255, 0.25)"); // 어두운 청록/파랑 빛
                line.setAttribute("stroke-width", "3.5");
                line.setAttribute("stroke-linecap", "round");
                line.style.filter = "drop-shadow(0px 0px 1px rgba(88, 166, 255, 0.4))";

                svg.appendChild(line);
            });
            console.log(`▶ [지도 그리기] ${segments.length}개의 궤도 세그먼트를 렌더링 완료하였습니다.`);
        }

        // 🗺️ 수신한 역(Station) 좌표를 웹 화면 비율(%)에 매핑하여 지도에 표시합니다.
        function drawStations(stations) {
            const mapContainer = document.getElementById('live-map');
            if (!mapContainer) return;

            // 기존에 그려진 역 마커가 있다면 겹치지 않게 초기화
            document.querySelectorAll('.station-marker-ui').forEach(el => el.remove());

            stations.forEach(st => {
                // 실제 3D 좌표 -> 관제 모니터 백분율 환산
                const xPct = ((st.x - ROBLOX_MAP_BOUNDS.minX) / (ROBLOX_MAP_BOUNDS.maxX - ROBLOX_MAP_BOUNDS.minX)) * 100;
                const zPct = ((st.z - ROBLOX_MAP_BOUNDS.minZ) / (ROBLOX_MAP_BOUNDS.maxZ - ROBLOX_MAP_BOUNDS.minZ)) * 100;

                // 역 마커를 위한 HTML 요소 생성
                const stationDiv = document.createElement('div');
                stationDiv.className = 'station-marker-ui';
                stationDiv.style.position = 'absolute';
                stationDiv.style.left = `${Math.max(0, Math.min(100, xPct))}%`;
                stationDiv.style.top = `${Math.max(0, Math.min(100, zPct))}%`;
                stationDiv.style.transform = 'translate(-50%, -50%)';
                stationDiv.style.textAlign = 'center';
                
                // 선로(z-index: 1)와 실시간 열차 마커(z-index: 2) 구조와 어우러지도록 z-index 설정
                stationDiv.style.zIndex = '1.5'; 
                
                // 역 표시 점과 이름표 디자인
                stationDiv.innerHTML = `
                    <div style="width: 10px; height: 10px; background: #fff; border: 2px solid var(--primary); border-radius: 50%; box-shadow: 0 0 6px var(--primary); margin: 0 auto;"></div>
                    <div style="margin-top: 4px; background: rgba(0,0,0,0.8); border-radius: 4px; padding: 2px 6px; color: #fff; font-size: 11px; font-weight: bold; white-space: nowrap; border: 1px solid rgba(88,166,255,0.3);">
                        ${st.name}
                    </div>
                `;

                mapContainer.appendChild(stationDiv);
            });
            console.log(`▶ [지도 그리기] ${stations.length}개의 역 위치를 렌더링 완료하였습니다.`);
        }

        async function fetchAccounts() {
            try {
                const res = await fetch(`/api/accounts?t=${Date.now()}`, { cache: 'no-store' });
                if (!res.ok) throw new Error("계정 목록 로드 실패");
                accountDB = await res.json();
                renderAccounts();
            } catch (e) {
                console.error("서버에서 계정 목록을 가져오지 못했습니다.", e);
            }
        }

        function switchView(viewId, element) {
            document.querySelectorAll('.view-section').forEach(sec => sec.classList.remove('active'));
            document.querySelectorAll('.menu-item').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`view-${viewId}`).classList.add('active');
            element.classList.add('active');
            const titles = { dashboard: "실시간 기차 통합 대시보드", accounts: "계정 및 시스템 권한 관리", logs: "통합 보안 감사 로그 모니터" };
            document.getElementById('nav-title').innerText = titles[viewId] || "통합 관제 시스템";
            closeSidebar(); // 📱 모바일에서 메뉴 선택 시 자동으로 닫기
        }

        // 🔒 [보안 업그레이드] 서버에 있는 bcrypt 암호화 해시와 브라우저 자체 대조 수행
        async function handleLogin() {
            const idInput = document.getElementById('login-id');
            const pwInput = document.getElementById('login-pw');
            const inputId = idInput.value.trim();
            const inputPw = pwInput.value.trim();

            if (!inputId) { alert("아이디를 입력하세요."); idInput.focus(); return; }
            if (!inputPw) { alert("비밀번호를 입력하세요."); pwInput.focus(); return; }

            await fetchAccounts();

            // 해시값 대조 작업 실행
            const found = accountDB.find(u => {
                if (u.id !== inputId) return false;
                try {
                    // DB 비밀번호 필드가 bcrypt 해시 형식인 경우 동적 비교 수행
                    if (u.pw.startsWith('$2')) {
                        return dcodeIO.bcrypt.compareSync(inputPw, u.pw);
                    }
                } catch (err) {
                    console.error("Bcrypt 복호화 에러:", err);
                }
                return u.pw === inputPw; // 백업용 일반 텍스트 비교
            });

            if (found) {
                currentUserSession = found;
                document.getElementById('auth-overlay').style.display = 'none';
                document.getElementById('session-role').innerText = currentUserSession.role;

                document.getElementById('session-username').innerText = "로딩 중...";
                const profile = await getRobloxProfile(currentUserSession.rbxId);

                document.getElementById('my-avatar').src = profile.avatarUrl;
                document.getElementById('session-username').innerText = profile.username;

                if (!hasAdminPrivilege(currentUserSession)) {
                    document.getElementById('menu-accounts').style.display = 'none';
                } else {
                    document.getElementById('menu-accounts').style.display = 'flex';
                }

                // 로그인 완료 시 최신 선로 데이터도 즉시 재호출
                await fetchTrackLayout();
            } else {
                alert("인증에 실패했습니다. 아이디 또는 비밀번호를 확인하세요.");
            }
        }

        function handleLogout() {
            currentUserSession = null;
            document.getElementById('login-id').value = "";
            document.getElementById('login-pw').value = "";
            document.getElementById('auth-overlay').style.display = 'flex';
            document.getElementById('my-avatar').src = FALLBACK_AVATAR;
            document.getElementById('session-username').innerText = "대기 중";
            document.getElementById('session-role').innerText = "-";
            switchView('dashboard', document.querySelector('.menu-item'));
        }

        function submitAccountForm() {
            if (isEditMode) updateExistingAccount();
            else createNewAccount();
        }

        async function createNewAccount() {
            if (!hasAdminPrivilege(currentUserSession)) return alert("계정을 생성할 권한이 없습니다.");

            const idInput = document.getElementById('new-user-id');
            const pwInput = document.getElementById('new-user-pw');
            const newId = idInput.value.trim();
            const newPw = pwInput.value.trim();
            const newRbx = parseInt(document.getElementById('new-user-rbx').value) || 1;
            const newRole = document.getElementById('new-user-role').value;

            if (!newId) { alert("발급할 관제원 아이디를 입력하세요."); idInput.focus(); return; }
            if (!newPw) { alert("비밀번호를 입력하세요."); pwInput.focus(); return; }

            try {
                const res = await fetch('/api/accounts', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        id: newId,
                        pw: newPw,
                        rbxId: newRbx,
                        role: newRole,
                        adminId: currentUserSession.id // 감사 로그용 adminId 전달
                    })
                });

                const data = await res.json();
                if (data.error) alert(data.error);
                else {
                    alert(`계정 [${newId}]이 정상 발급되었습니다.`);
                    clearForm();
                    await fetchAccounts();
                }
            } catch (e) {
                console.error("계정 생성 오류", e);
            }
        }

        // 🔄 계정 정보 수정 UI 갱신 (비밀번호 이중 암호화 방지 구조)
        function startEditMode(id, rbxId, role) {
            isEditMode = true;
            editingTargetId = id;

            document.getElementById('form-main-title').innerHTML = `<i class="fa-solid fa-user-pen"></i> 관제 계정 정보 수정`;
            document.getElementById('form-action-title').innerText = "정보 수정 진행 중";

            const idInput = document.getElementById('new-user-id');
            idInput.value = id;
            idInput.disabled = true;

            // 해시값 노출을 막고 수정 의사가 있을 때만 전송할 수 있도록 비움
            document.getElementById('new-user-pw').value = "";
            document.getElementById('new-user-pw').placeholder = "변경할 때만 새 비밀번호 입력";

            document.getElementById('new-user-rbx').value = rbxId;
            document.getElementById('new-user-role').value = role;

            document.getElementById('btn-submit').innerText = "수정 완료";
            document.getElementById('btn-cancel').style.display = "block";
        }

        function cancelEditMode() {
            isEditMode = false;
            editingTargetId = null;
            clearForm();
        }

        function clearForm() {
            document.getElementById('form-main-title').innerHTML = `<i class="fa-solid fa-user-plus"></i> 신규 하위 관제 계정 발급 시스템`;
            document.getElementById('form-action-title').innerText = "계정 생성";

            const idInput = document.getElementById('new-user-id');
            idInput.value = "";
            idInput.disabled = false;

            document.getElementById('new-user-pw').value = "";
            document.getElementById('new-user-pw').placeholder = "비밀번호 지정";
            document.getElementById('new-user-rbx').value = "1";
            document.getElementById('new-user-role').value = "일반 관제원";

            document.getElementById('btn-submit').innerText = "계정 생성 및 발급";
            document.getElementById('btn-cancel').style.display = "none";
        }

        async function updateExistingAccount() {
            if (!hasAdminPrivilege(currentUserSession)) return alert("계정을 수정할 권한이 없습니다.");

            const pwInput = document.getElementById('new-user-pw');
            const pw = pwInput.value.trim();
            const rbxId = parseInt(document.getElementById('new-user-rbx').value) || 1;
            const role = document.getElementById('new-user-role').value;

            // 수정 시 변경값이 공백인 항목은 전송하지 않음 (패스워드 유지 기능)
            const payload = {
                rbxId: rbxId,
                role: role,
                adminId: currentUserSession.id
            };
            if (pw) {
                payload.pw = pw;
            }

            try {
                const res = await fetch(`/api/accounts/${editingTargetId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await res.json();
                if (data.error) alert(data.error);
                else {
                    alert(`계정 [${editingTargetId}]의 정보가 수정되었습니다.`);
                    cancelEditMode();
                    await fetchAccounts();
                }
            } catch (e) {
                console.error("계정 수정 중 통신 실패", e);
            }
        }

        async function deleteAccount(id) {
            if (!hasAdminPrivilege(currentUserSession)) return alert("계정을 삭제할 권한이 없습니다.");
            if (id === MASTER_ADMIN_ID) return alert("시스템 마스터 계정은 삭제할 수 없습니다.");

            if (!confirm(`정말로 계정 [${id}]을(를) 삭제하시겠습니까?\n삭제된 데이터는 복구할 수 없습니다.`)) return;

            try {
                const res = await fetch(`/api/accounts/${id}`, {
                    method: 'DELETE',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ adminId: currentUserSession.id }) // 감사 로그용 데이터 탑재
                });
                const data = await res.json();
                if (data.error) alert(data.error);
                else {
                    alert(`계정 [${id}]이 삭제되었습니다.`);
                    if (isEditMode && editingTargetId === id) cancelEditMode();
                    await fetchAccounts();
                }
            } catch (e) {
                console.error("계정 삭제 중 오류 발생", e);
            }
        }

        function renderAccounts() {
            const tbody = document.getElementById('account-table-body');
            tbody.innerHTML = "";
            accountDB.forEach(u => {
                const isSuperAdmin = (u.role === '최고 관리자' || u.id === MASTER_ADMIN_ID);
                const tr = document.createElement('tr');

                // 암호값인 u.pw는 파라미터에서 제거하여 보안 유출 및 따옴표 깨짐 에러 방지
                const actionButtons = isSuperAdmin ?
                    `<span style="color:var(--text-muted); font-size:12px;"><i class="fa-solid fa-lock"></i> 수정/삭제 보호됨</span>` :
                    `<button class="btn btn-primary" style="display:inline-block; padding: 4px 10px; font-size:11px; margin-right:5px; font-weight:700;" onclick="startEditMode('${u.id}', ${u.rbxId}, '${u.role}')"><i class="fa-solid fa-pen"></i> 수정</button>
                     <button class="btn btn-danger" style="display:inline-block; padding: 4px 10px; font-size:11px; font-weight:700;" onclick="deleteAccount('${u.id}')"><i class="fa-solid fa-trash"></i> 삭제</button>`;

                tr.innerHTML = `
                    <td><img id="acc-avatar-${u.id}" src="${FALLBACK_AVATAR}" style="width:32px; height:32px; border-radius:50%; border:1px solid var(--primary); object-fit:cover;"></td>
                    <td style="font-weight:bold;">${u.id}</td>
                    <td><span id="acc-name-${u.id}">불러오는 중...</span> (ID: ${u.rbxId})</td>
                    <td><span style="color:${isSuperAdmin ? 'var(--primary)' : 'var(--text-muted)'}">${u.role}</span></td>
                    <td><span class="status-badge status-normal" style="padding: 2px 6px; font-size:11px;">활성화됨</span></td>
                    <td>${actionButtons}</td>
                `;
                tbody.appendChild(tr);

                getRobloxProfile(u.rbxId).then(profile => {
                    const avatarImg = document.getElementById(`acc-avatar-${u.id}`);
                    const nameSpan = document.getElementById(`acc-name-${u.id}`);
                    if (avatarImg) avatarImg.src = profile.avatarUrl;
                    if (nameSpan) nameSpan.innerText = profile.username;
                });
            });
        }

        function renderLogs(logs) {
            if (!logs || logs.length === 0 || logs.length === lastRenderedLogCount) return;

            const container = document.getElementById('log-display-container');
            container.innerHTML = "";

            logs.forEach(log => {
                const logLine = document.createElement('div');
                logLine.className = 'log-line';
                logLine.innerHTML = `<span class="log-time">[${log.timeStr || log.time}]</span><span class="log-user">@${log.user || 'SYSTEM'}</span> <span style="color:#fff;">${log.text || log.message}</span>`;
                container.appendChild(logLine);
            });

            container.scrollTop = container.scrollHeight;
            lastRenderedLogCount = logs.length;
        }

        // DOM 업데이트 헬퍼 함수 (값이 변경되었을 때만 DOM을 조작하여 렉 방지)
        function updateTextSafely(element, newText) {
            if (element && element.innerText !== newText) {
                element.innerText = newText;
            }
        }

        async function updateDashboard() {
            if (!currentUserSession) return;

            try {
                const res = await fetch(`/api/current-data?t=${Date.now()}`, { cache: 'no-store' });
                if (!res.ok) throw new Error("실시간 데이터 동기화 실패");
                const data = await res.json() || {};

                const trains = data.trains || {};
                const logs = data.logs || [];

                renderLogs(logs);

                const grid = document.getElementById('dashboard-grid');
                const markerLayer = document.getElementById('train-markers-layer');
                const noTrainsMsg = document.getElementById('no-trains-msg');

                const currentIds = Object.keys(trains);

                if (currentIds.length === 0) {
                    grid.innerHTML = '<div class="no-trains" id="no-trains-msg">네트워크 연결 대기 중이거나 운행 중인 열차가 없습니다.</div>';
                    markerLayer.innerHTML = '';
                    return;
                }

                if (noTrainsMsg) noTrainsMsg.remove();

                // 사라진 열차 UI 삭제
                document.querySelectorAll('.train-card').forEach(card => {
                    if (!trains[card.dataset.id]) card.remove();
                });
                document.querySelectorAll('.train-marker').forEach(marker => {
                    if (!trains[marker.dataset.id]) marker.remove();
                });

                for (const id in trains) {
                    const train = trains[id];
                    if (!train) continue;

                    const speed = typeof train.CurrentSpeed !== 'undefined' ? train.CurrentSpeed : (train.Speed || 0);
                    const speedLimit = typeof train.SpeedLimit !== 'undefined' ? train.SpeedLimit : (train.Limit || 30);
                    const isEms = train.IsEmergency || train.Emergency || train.remoteEmergencyActive;
                    const posX = typeof train.PositionX !== 'undefined' ? train.PositionX : (train.X || 0);
                    const posZ = typeof train.PositionZ !== 'undefined' ? train.PositionZ : (train.Z || 0);
                    const notch = typeof train.CurrentNotch !== 'undefined' ? train.CurrentNotch : (train.Notch || 0);
                    const reverser = typeof train.CurrentReverser !== 'undefined' ? train.CurrentReverser : (train.Reverser || 0);
                    const trainLine = train.Line || train.LineName || "정보 없음";
                    const trainDest = train.Destination || train.DestinationName || "정보 없음";

                    const safeTrainName = typeof train.TrainName === 'string' ? train.TrainName : String(train.TrainName || "운행열차");

                    // 1. 마커 업데이트 최적화
                    let marker = document.querySelector(`.train-marker[data-id="${id}"]`);
                    if (!marker) {
                        marker = document.createElement('div');
                        marker.className = 'train-marker';
                        marker.dataset.id = id;
                        const label = document.createElement('div');
                        label.className = 'train-marker-label';
                        marker.appendChild(label);
                        markerLayer.appendChild(marker); // svg의 z-index 위층 레이어에 삽입
                    }

                    if (isEms) {
                        if (!marker.classList.contains('ems')) marker.classList.add('ems');
                    } else {
                        if (marker.classList.contains('ems')) marker.classList.remove('ems');
                    }

                    let pctX = (((posX) - ROBLOX_MAP_BOUNDS.minX) / (ROBLOX_MAP_BOUNDS.maxX - ROBLOX_MAP_BOUNDS.minX)) * 100;
                    let pctZ = (((posZ) - ROBLOX_MAP_BOUNDS.minZ) / (ROBLOX_MAP_BOUNDS.maxZ - ROBLOX_MAP_BOUNDS.minZ)) * 100;

                    const newLeft = `${Math.max(0, Math.min(100, pctX))}%`;
                    const newTop = `${Math.max(0, Math.min(100, pctZ))}%`;
                    if (marker.style.left !== newLeft) marker.style.left = newLeft;
                    if (marker.style.top !== newTop) marker.style.top = newTop;

                    const markerLabel = `${safeTrainName.split(' ')[0]} (${speed}km/h)`;
                    updateTextSafely(marker.querySelector('.train-marker-label'), markerLabel);

                    // 2. 카드 업데이트 최적화
                    let card = document.querySelector(`.train-card[data-id="${id}"]`);
                    if (!card) {
                        card = document.createElement('div');
                        card.className = 'train-card';
                        card.dataset.id = id;
                        card.dataset.driverId = ""; // 운전자 변경 추적용 데이터셋 추가
                        card.innerHTML = `
                            <div>
                                <div class="card-header">
                                    <span class="v-name"></span>
                                    <span class="train-id">ID: ${id}</span>
                                </div>
                                <div class="info-row"><span class="info-label">현재 속도</span><span class="info-value v-speed">0 km/h</span></div>
                                <div class="info-row"><span class="info-label">운행 노선</span><span class="info-value v-line">-</span></div>
                                <div class="info-row"><span class="info-label">행선지</span><span class="info-value v-destination">-</span></div>
                                <div class="info-row"><span class="info-label">제어 단수</span><span class="info-value v-notch">N</span></div>
                                <div class="info-row"><span class="info-label">역전기 방향</span><span class="info-value v-rev">중립 (N)</span></div>
                                <div class="info-row"><span class="info-label">현재 좌표 (X, Z)</span><span class="info-value v-pos" style="color:var(--text-muted);">0, 0</span></div>
                                <div class="info-row"><span class="info-label">경계장치 상태</span><span class="info-value v-vigilance" style="font-weight:700;">활성화 (정상)</span></div>
                                <div class="limit-input-zone">
                                    <span style="font-size:13px; font-weight:500;">ATC 제한속도 변경</span>
                                    <div>
                                        <input type="number" class="limit-input" value="${speedLimit}" 
                                               onfocus="this.dataset.editing='true'" 
                                               onblur="setTimeout(() => { this.dataset.editing='false'; }, 500)">
                                        <button class="btn-sm btn btn-primary" style="padding:6px 10px; display:inline-block;" onclick="setSpeedLimit('${id}', this)"><i class="fa-solid fa-check"></i></button>
                                    </div>
                                </div>
                                <div class="info-row" style="align-items:center; margin-top:15px;">
                                    <span class="info-label">안전 상태</span>
                                    <span class="status-badge v-badge">정상</span>
                                </div>
                            </div>
                            <div>
                                <div class="driver-zone">
                                    <img class="avatar v-avatar" src="${FALLBACK_AVATAR}" alt="Driver">
                                    <div class="driver-meta">
                                        <span class="driver-name v-driver">대기 중</span>
                                        <span style="font-size:11px; color:var(--text-muted);">Roblox 기장</span>
                                    </div>
                                </div>
                                <div class="control-zone">
                                    <button class="btn btn-danger" onclick="triggerEmergency('${id}')"><i class="fa-solid fa-triangle-exclamation"></i> 비상정지</button>
                                    <button class="btn btn-safe" onclick="resetEmergency('${id}')"><i class="fa-solid fa-lock-open"></i> 해제</button>
                                    <button class="btn v-vigilance-btn" onclick="toggleVigilance('${id}')"><i class="fa-solid fa-eye-slash"></i> 경계 끄기</button>
                                </div>
                            </div>
                        `;
                        grid.appendChild(card);
                    }

                    // 텍스트 정보 최적화 반영
                    updateTextSafely(card.querySelector('.v-name'), safeTrainName);
                    updateTextSafely(card.querySelector('.v-speed'), `${speed} km/h (제한: ${speedLimit} km/h)`);
                    updateTextSafely(card.querySelector('.v-line'), trainLine);
                    updateTextSafely(card.querySelector('.v-destination'), trainDest);

                    let notchText = "N";
                    if (notch > 0) notchText = "P" + notch;
                    else if (notch < 0) notchText = (notch === -5) ? "EB (비상)" : "B" + Math.abs(notch);
                    updateTextSafely(card.querySelector('.v-notch'), notchText);

                    let revText = "중립 (N)";
                    if (reverser === 1) revText = "전진 (F)";
                    else if (reverser === -1) revText = "후진 (B)";
                    updateTextSafely(card.querySelector('.v-rev'), revText);
                    updateTextSafely(card.querySelector('.v-pos'), `${posX}, ${posZ}`);

                    const vigSpan = card.querySelector('.v-vigilance');
                    const vigBtn = card.querySelector('.v-vigilance-btn');
                    const isVigActive = train.VigilanceEnabled !== false;

                    if (isVigActive) {
                        updateTextSafely(vigSpan, "작동 중 (정상)");
                        if (vigSpan && vigSpan.style.color !== "var(--success)") vigSpan.style.color = "var(--success)";
                        if (vigBtn && vigBtn.innerHTML.indexOf("경계 끄기") === -1) {
                            vigBtn.style.background = "#e67e22";
                            vigBtn.innerHTML = "<i class='fa-solid fa-eye-slash'></i> 경계 끄기";
                        }
                    } else {
                        updateTextSafely(vigSpan, "비활성화 (원격)");
                        if (vigSpan && vigSpan.style.color !== "var(--danger)") vigSpan.style.color = "var(--danger)";
                        if (vigBtn && vigBtn.innerHTML.indexOf("경계 켜기") === -1) {
                            vigBtn.style.background = "var(--success)";
                            vigBtn.innerHTML = "<i class='fa-solid fa-eye'></i> 경계 켜기";
                        }
                    }

                    // 🔒 Race Condition (인풋 덮어씌움) 방지 로직 보완
                    const limitInput = card.querySelector('.limit-input');
                    if (limitInput && limitInput.dataset.editing !== 'true' && limitInput.dataset.pending !== 'true' && document.activeElement !== limitInput) {
                        if (limitInput.value !== String(speedLimit)) {
                            limitInput.value = speedLimit;
                        }
                    }

                    const badge = card.querySelector('.v-badge');
                    if (train.remoteEmergencyActive) {
                        if (badge.className !== "status-badge status-ems") badge.className = "status-badge status-ems";
                        updateTextSafely(badge, "원격 강제 제동");
                    } else if (train.IsEmergency || train.Emergency) {
                        if (badge.className !== "status-badge status-ems") badge.className = "status-badge status-ems";
                        updateTextSafely(badge, "과속/비상 체결");
                    } else {
                        if (badge.className !== "status-badge status-normal") badge.className = "status-badge status-normal";
                        updateTextSafely(badge, "정상 신호 운영");
                    }

                    // 🚀 로블록스 아바타 무한 로딩 렉 방지 (운전자가 바뀔 때만 통신)
                    const targetUserId = train.DriverId > 0 ? train.DriverId : 1;
                    if (card.dataset.driverId !== String(targetUserId)) {
                        card.dataset.driverId = String(targetUserId); // 현재 운전자 ID 고정

                        getRobloxProfile(targetUserId).then(profile => {
                            const avatarImg = card.querySelector('.v-avatar');
                            const nameSpan = card.querySelector('.v-driver');
                            if (avatarImg && avatarImg.src !== profile.avatarUrl) {
                                avatarImg.src = profile.avatarUrl;
                            }
                            if (nameSpan) {
                                nameSpan.innerText = train.DriverName || profile.username;
                            }
                        });
                    } else {
                        const nameSpan = card.querySelector('.v-driver');
                        if (nameSpan && train.DriverName) {
                            updateTextSafely(nameSpan, train.DriverName);
                        }
                    }
                }
            } catch (e) {
                console.error("대시보드 동기화 오류...", e);
            }
        }

        async function setSpeedLimit(trainId, buttonObj) {
            const inputField = buttonObj.previousElementSibling;
            const inputVal = parseInt(inputField.value);
            if (isNaN(inputVal) || inputVal < 0) return alert("올바른 속도를 입력하세요.");

            // 🌟 폼 덮어쓰기 방지 (보호 모드 2초 유지)
            inputField.dataset.pending = 'true';
            setTimeout(() => { inputField.dataset.pending = 'false'; }, 2000);

            try {
                await fetch('/api/web-speedlimit', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ trainId: trainId, speedLimit: inputVal, adminId: currentUserSession.id })
                });
            } catch (e) {
                console.error("속도 제한 전송 실패", e);
            }
        }

        async function triggerEmergency(trainId) {
            await fetch('/api/web-emergency', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ trainId: trainId, adminId: currentUserSession.id })
            });
        }

        async function resetEmergency(trainId) {
            await fetch('/api/web-reset', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ trainId: trainId, adminId: currentUserSession.id })
            });
        }

        async function toggleVigilance(trainId) {
            const card = document.querySelector(`.train-card[data-id="${trainId}"]`);
            if (!card) return;
            const vigSpan = card.querySelector('.v-vigilance');
            const isCurrentlyEnabled = vigSpan && vigSpan.innerText.includes("작동 중");
            const nextState = !isCurrentlyEnabled;

            await fetch('/api/web-vigilance', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ trainId: trainId, vigilanceEnabled: nextState, adminId: currentUserSession.id })
            });
        }

        // 1초 단위 실시간 데이터 갱신
        setInterval(updateDashboard, 1000);
    </script>
</body>

</html>
